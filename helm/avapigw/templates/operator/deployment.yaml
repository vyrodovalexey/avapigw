{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "avapigw.operator.fullname" . }}
  labels:
    {{- include "avapigw.operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "avapigw.operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.operator.metrics.port | default 8080 | quote }}
        prometheus.io/path: "/metrics"
        {{- with .Values.operator.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "avapigw.operator.labels" . | nindent 8 }}
        {{- with .Values.operator.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- /* Merge operator-specific and global pull secrets into a single
             imagePullSecrets key (duplicate map keys are rejected by strict
             YAML parsers). */}}
      {{- with (concat (.Values.operator.imagePullSecrets | default list) (.Values.imagePullSecrets | default list) | uniq) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "avapigw.operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.operator.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          securityContext:
            {{- toYaml .Values.operator.securityContext | nindent 12 }}
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - /operator
          args:
            {{- if .Values.operator.leaderElection.enabled }}
            - --leader-elect
            - --leader-election-id={{ .Values.operator.leaderElection.resourceName }}
            {{- end }}
            - --health-probe-bind-address=:{{ .Values.operator.health.port }}
            - --metrics-bind-address=:{{ .Values.operator.metrics.port }}
            {{- if .Values.operator.webhook.enabled }}
            - --webhook-port={{ .Values.operator.webhook.port }}
            - --enable-webhooks=true
            - --webhook-config-name={{ include "avapigw.operator.fullname" . }}-validating-webhook
            - --cert-provider={{ .Values.operator.webhook.tls.mode | default "selfsigned" }}
            - --cert-service-name={{ include "avapigw.operator.webhookServiceName" . }}
            - --cert-namespace={{ .Release.Namespace }}
            {{- else }}
            - --enable-webhooks=false
            - --cert-provider={{ .Values.operator.grpc.tls.mode | default "selfsigned" }}
            - --cert-service-name={{ include "avapigw.operator.fullname" . }}
            - --cert-namespace={{ .Release.Namespace }}
            {{- end }}
            - --grpc-port={{ .Values.operator.grpc.port }}
            {{- if .Values.operator.grpc.requireClientCert }}
            - --grpc-require-client-cert=true
            {{- end }}
            {{- if .Values.operator.ingressController.enabled }}
            - --enable-ingress-controller=true
            - --ingress-class-name={{ .Values.operator.ingressController.className | default "avapigw" }}
            {{- if .Values.operator.ingressController.lbAddress }}
            - --ingress-lb-address={{ .Values.operator.ingressController.lbAddress }}
            {{- end }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.operator.vault.enabled }}
            - name: VAULT_ADDR
              value: {{ .Values.operator.vault.address | quote }}
            - name: VAULT_AUTH_METHOD
              value: {{ .Values.operator.vault.authMethod | default "kubernetes" | quote }}
            {{- if eq (.Values.operator.vault.authMethod | default "kubernetes") "token" }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "avapigw.operator.fullname" . }}-vault
                  key: token
            {{- end }}
            {{- if eq (.Values.operator.vault.authMethod | default "kubernetes") "kubernetes" }}
            - name: VAULT_K8S_ROLE
              value: {{ .Values.operator.vault.role | quote }}
            - name: VAULT_K8S_MOUNT_PATH
              value: {{ .Values.operator.vault.kubernetesMountPath | default "kubernetes" | quote }}
            {{- end }}
            {{- if eq (.Values.operator.grpc.tls.mode | default "selfsigned") "vault" }}
            - name: VAULT_PKI_MOUNT
              value: {{ .Values.operator.grpc.tls.vault.pkiMount | default "pki" | quote }}
            - name: VAULT_PKI_ROLE
              value: {{ .Values.operator.grpc.tls.vault.role | quote }}
            {{- end }}
            {{- /*
              Certificate identity. The effective cert provider is
              webhook.tls.mode when webhooks are enabled, grpc.tls.mode
              otherwise (matches the --cert-provider flag above). One
              certificate serves BOTH the webhook server (called by the API
              server) and the gRPC server (dialed by the gateway), so the SAN
              list must always cover both service names.

              vault provider: FQDN forms are used for CN/SANs because Vault
              PKI roles typically restrict allowed domains (e.g. "svc" with
              subdomains) and reject bare service names.
              selfsigned provider: short service name CN with default SANs
              plus explicit SANs covering both services.
            */}}
            {{- $certProvider := include "avapigw.operator.certProvider" . }}
            {{- $grpcSvc := include "avapigw.operator.fullname" . }}
            {{- $webhookSvc := include "avapigw.operator.webhookServiceName" . }}
            {{- $primarySvc := ternary $webhookSvc $grpcSvc .Values.operator.webhook.enabled }}
            {{- $ns := .Release.Namespace }}
            {{- if eq $certProvider "vault" }}
            - name: CERT_SERVICE_NAME
              value: {{ printf "%s.%s.svc" $primarySvc $ns | quote }}
            - name: CERT_DNS_NAMES
              value: {{ printf "%s.%s.svc,%s.%s.svc.cluster.local,%s.%s.svc,%s.%s.svc.cluster.local" $webhookSvc $ns $webhookSvc $ns $grpcSvc $ns $grpcSvc $ns | quote }}
            {{- else }}
            - name: CERT_SERVICE_NAME
              value: {{ $primarySvc | quote }}
            - name: CERT_DNS_NAMES
              value: {{ printf "%s,%s.%s,%s.%s.svc,%s.%s.svc.cluster.local,%s,%s.%s,%s.%s.svc,%s.%s.svc.cluster.local" $webhookSvc $webhookSvc $ns $webhookSvc $ns $webhookSvc $ns $grpcSvc $grpcSvc $ns $grpcSvc $ns $grpcSvc $ns | quote }}
            {{- end }}
            - name: CERT_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            {{- end }}
            {{- if eq (include "avapigw.operator.certProvider" .) "selfsigned" }}
            {{- /*
              selfsigned CA persistence: the operator stores its CA (+ serving
              cert) in the gRPC cert Secret mounted by the gateway, so the CA
              survives operator restarts and the gateway verifies TLS against
              a stable ca.crt. The Secret is seeded by grpc-cert-secret.yaml
              (helm genCA incl. ca.key) and adopted/refreshed by the operator.
              RBAC: operator/cert-secret-role.yaml.
            */}}
            - name: CERT_SECRET_NAME
              value: {{ printf "%s-grpc-cert" (include "avapigw.operator.fullname" .) | quote }}
            - name: CERT_SECRET_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            {{- end }}
            {{- if .Values.operator.webhook.duplicateDetection }}
            {{- if .Values.operator.webhook.duplicateDetection.clusterWide }}
            - name: ENABLE_CLUSTER_WIDE_DUPLICATE_CHECK
              value: "true"
            {{- end }}
            {{- if eq .Values.operator.webhook.duplicateDetection.cacheEnabled false }}
            - name: DUPLICATE_CACHE_ENABLED
              value: "false"
            {{- end }}
            {{- if .Values.operator.webhook.duplicateDetection.cacheTTL }}
            - name: DUPLICATE_CACHE_TTL
              value: {{ .Values.operator.webhook.duplicateDetection.cacheTTL | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.operator.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.operator.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.operator.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.operator.health.port }}
              protocol: TCP
            {{- if .Values.operator.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.operator.webhook.port }}
              protocol: TCP
            {{- end }}
            - name: grpc
              containerPort: {{ .Values.operator.grpc.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.operator.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.operator.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.operator.webhook.enabled }}
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              {{- if not (or (eq .Values.operator.webhook.tls.mode "selfsigned") (eq .Values.operator.webhook.tls.mode "vault")) }}
              readOnly: true
              {{- end }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- with .Values.operator.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.operator.webhook.enabled }}
        - name: webhook-cert
          {{- if or (eq .Values.operator.webhook.tls.mode "selfsigned") (eq .Values.operator.webhook.tls.mode "vault") }}
          # For selfsigned and vault modes the operator obtains certificates
          # from its certificate manager at runtime and writes them itself;
          # an emptyDir keeps the path writable (no pre-existing Secret needed).
          emptyDir: {}
          {{- else }}
          # For cert-manager mode, mount the certificate secret
          secret:
            secretName: {{ include "avapigw.operator.webhookCertSecretName" . }}
            defaultMode: 420
          {{- end }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- with .Values.operator.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
