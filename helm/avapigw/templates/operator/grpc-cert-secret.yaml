{{- /*
Operator gRPC CA/certificate Secret ("<operator-fullname>-grpc-cert").

The gateway Deployment mounts this Secret's ca.crt when operator mode is
enabled with TLS verification (gateway.operatorMode.tls=true and
tlsInsecure=false) - see templates/deployment.yaml. Without this Secret the
secure-by-default operator-mode deployment is unschedulable (missing volume).

Sources for the Secret content, in priority order:

1. gateway.operatorMode.caSecret set        -> nothing rendered here; the user
                                               brings their own Secret.
2. operator.grpc.tls.caBundle set (PEM)     -> ca.crt from the provided bundle.
                                               Use this with
                                               operator.grpc.tls.mode=vault:
                                               the operator serves certificates
                                               issued by Vault PKI, so ca.crt
                                               must be the (stable) Vault PKI
                                               CA certificate.
3. otherwise                                -> Helm-generated self-signed CA +
                                               server certificate (genCA /
                                               genSignedCert), INCLUDING ca.key
                                               so the operator can adopt this
                                               CA (see below). An existing
                                               Secret is looked up and reused
                                               so upgrades do NOT rotate the CA.

selfsigned mode integration: with operator.grpc.tls.mode=selfsigned the
operator's certificate manager PERSISTS its CA and serving certificate in
this same Secret (CERT_SECRET_NAME env, see operator/deployment.yaml):

  - On startup the operator loads ca.crt/ca.key and REUSES the CA while it
    is valid (helm-generated or operator-generated - CA stays stable across
    restarts and helm upgrades; the lookup-reuse above preserves the
    operator-written keys, so the operator-persisted content takes
    precedence over regeneration).
  - An expired/expiring or incomplete CA (e.g. a pre-existing Secret
    without ca.key) is regenerated by the operator and written back here;
    tls.crt/tls.key are refreshed on issuance and rotation.
  - The gateway keeps verifying against ca.crt from this Secret.

RBAC for the operator's Secret writes is granted by
operator/cert-secret-role.yaml (selfsigned mode only).
*/ -}}
{{- if and .Values.operator.enabled .Values.gateway.operatorMode .Values.gateway.operatorMode.enabled }}
{{- $operatorTLS := true }}
{{- if hasKey .Values.gateway.operatorMode "tls" }}
  {{- $operatorTLS = .Values.gateway.operatorMode.tls }}
{{- end }}
{{- $operatorTLSInsecure := false }}
{{- if hasKey .Values.gateway.operatorMode "tlsInsecure" }}
  {{- $operatorTLSInsecure = .Values.gateway.operatorMode.tlsInsecure }}
{{- end }}
{{- if and $operatorTLS (not $operatorTLSInsecure) (not .Values.gateway.operatorMode.caSecret) }}
{{- $secretName := printf "%s-grpc-cert" (include "avapigw.operator.fullname" .) }}
{{- $caBundle := "" }}
{{- if and .Values.operator.grpc .Values.operator.grpc.tls }}
  {{- $caBundle = .Values.operator.grpc.tls.caBundle | default "" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "avapigw.operator.labels" . | nindent 4 }}
type: Opaque
data:
{{- if $caBundle }}
  # External CA bundle (e.g. Vault PKI CA) provided via operator.grpc.tls.caBundle
  ca.crt: {{ $caBundle | b64enc | quote }}
{{- else }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if and $existing $existing.data (index $existing.data "ca.crt") }}
  # Reused from the existing Secret so upgrades do not rotate the CA
  {{- range $key, $value := $existing.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- else }}
{{- $operatorName := include "avapigw.operator.fullname" . }}
{{- $webhookName := include "avapigw.operator.webhookServiceName" . }}
{{- $ns := .Release.Namespace }}
{{- $dnsNames := list
      $operatorName
      (printf "%s.%s" $operatorName $ns)
      (printf "%s.%s.svc" $operatorName $ns)
      (printf "%s.%s.svc.cluster.local" $operatorName $ns)
      $webhookName
      (printf "%s.%s" $webhookName $ns)
      (printf "%s.%s.svc" $webhookName $ns)
      (printf "%s.%s.svc.cluster.local" $webhookName $ns) }}
{{- $ca := genCA (printf "%s-grpc-ca" $operatorName) 3650 }}
{{- $cert := genSignedCert $operatorName nil $dnsNames 365 $ca }}
  ca.crt: {{ $ca.Cert | b64enc | quote }}
  # ca.key lets the operator's selfsigned provider ADOPT this CA (reuse-if-valid)
  # and keep issuing serving certificates from it across restarts.
  ca.key: {{ $ca.Key | b64enc | quote }}
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
