{{- /*
Namespaced RBAC for the operator's selfsigned CA persistence
(internal/operator/cert selfsigned provider, wired via CERT_SECRET_NAME in
operator/deployment.yaml): the operator creates/updates the
"<operator-fullname>-grpc-cert" Secret with its CA and serving certificate
so the CA survives restarts and the gateway can verify TLS against ca.crt.

Rendered only for the selfsigned certificate provider; the vault and
cert-manager/file providers never write Secrets (read access comes from the
operator ClusterRole).
*/ -}}
{{- if and .Values.operator.enabled (eq (include "avapigw.operator.certProvider" .) "selfsigned") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "avapigw.operator.fullname" . }}-cert-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "avapigw.operator.labels" . | nindent 4 }}
rules:
  # Certificate persistence Secret (CA + serving certificate).
  # create cannot be restricted by resourceNames; get/update grants are
  # namespace-scoped, and the operator only manages its own cert Secret.
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "avapigw.operator.fullname" . }}-cert-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "avapigw.operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "avapigw.operator.fullname" . }}-cert-secret
subjects:
  - kind: ServiceAccount
    name: {{ include "avapigw.operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
