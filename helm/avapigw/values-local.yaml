# Local Kubernetes deployment values for avapigw
# Uses Docker Desktop K8s with docker-compose backends on host network
#
# NAMESPACE: avapigw-test (REQUIRED)
# Deploy with: helm upgrade --install avapigw helm/avapigw/ -f helm/avapigw/values-local.yaml -n avapigw-test --create-namespace
#
# TLS Configuration:
#   - HTTP listener: HTTPS on port 8443 via Vault PKI (TLS enabled)
#     plus an additional PLAIN HTTP listener on port 8080 (plainAlongsideTls)
#   - gRPC listener: gRPC TLS on port 9443 via Vault PKI (TLS enabled)
#   - Operator gRPC server: Vault PKI TLS, VERIFIED by the gateway against
#     the PKI CA (Secret avapigw-vault-pki-ca; no tlsInsecure needed)
#   - Vault running in Docker Compose at http://host.docker.internal:8200
#   - Vault KUBERNETES auth: gateway SA "avapigw" -> role "avapigw",
#     operator SA "avapigw-operator" -> role "avapigw-operator"
#   - Vault PKI engine with role "test-role"
#
# Vault must be configured with (setup-vault-k8s.sh --setup-pki does all):
#   - Kubernetes auth for the local cluster + roles avapigw/avapigw-operator
#   - PKI engine enabled with test-role (allows localhost, *.local, *.test,
#     avapigw.local, *.docker.internal, *.svc)
#   - Policy avapigw granting PKI issue, KV read, Transit operations
#   - K8s Secret avapigw-vault-pki-ca (ca.crt = PKI CA) in avapigw-test
#
# Setup scripts:
#   - ./test/performance/scripts/setup-vault-k8s.sh --namespace=avapigw-test --setup-pki
#   - ./test/performance/scripts/run-k8s-test.sh --namespace=avapigw-test

# Explicit namespace configuration for local testing
# This ensures consistent namespace usage across all test scripts
namespace: avapigw-test

replicaCount: 1

image:
  repository: avapigw
  pullPolicy: Never
  tag: "test"

service:
  type: NodePort
  httpPort: 8080
  httpsPort: 8443
  grpcPort: 9000
  grpcTlsPort: 9443
  metricsPort: 9090
  # Fixed NodePort for the metrics endpoint so the docker-compose VictoriaMetrics
  # static scrape job 'avapigw-gateway-k8s' (host.docker.internal:31918) has a
  # deterministic target across redeploys. The in-cluster vmagent scrapes the pod
  # directly regardless of this value.
  metricsNodePort: 31918

# Relax security for local testing
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: metrics
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

gateway:
  logLevel: info
  logFormat: json
  environment: local-k8s

  # Operator mode - gateway connects to operator via gRPC with VERIFIED TLS.
  # The operator issues its gRPC serving certificate from Vault PKI
  # (operator.grpc.tls.mode=vault below), whose CA is stable across operator
  # restarts. The CA is stored in the "avapigw-vault-pki-ca" Secret created by
  # test/performance/scripts/setup-vault-k8s.sh --setup-pki (make perf-setup-vault-k8s).
  # Set tlsInsecure: true only to skip verification for quick dev loops.
  #
  # NOTE: the chart DEFAULT (operator tls.mode=selfsigned, no caSecret) now
  # also yields verified TLS without Vault: the operator persists/reuses its
  # CA in the "<operator-fullname>-grpc-cert" Secret mounted by the gateway
  # (see values.yaml operator.grpc.tls). This overlay keeps vault mode to
  # exercise the Vault PKI integration; to test the selfsigned default use:
  #   --set operator.grpc.tls.mode=selfsigned \
  #   --set operator.webhook.tls.mode=selfsigned \
  #   --set gateway.operatorMode.caSecret=""
  operatorMode:
    enabled: true
    tls: true
    tlsInsecure: false
    caSecret: avapigw-vault-pki-ca

  # Listener configuration
  # HTTP and gRPC listeners with Vault PKI TLS. A PLAIN HTTP listener is
  # rendered alongside the HTTPS one (plainAlongsideTls) so local/perf runs
  # can exercise plaintext 8080 without dropping the TLS listeners.
  listeners:
    http:
      enabled: true
      port: 8080
      bind: "0.0.0.0"
      hosts:
        - "*"
      plainAlongsideTls: true
    grpc:
      enabled: true
      port: 9000
      bind: "0.0.0.0"
      hosts:
        - "*"
      maxConcurrentStreams: 100
      maxRecvMsgSize: 4194304
      maxSendMsgSize: 4194304
      reflection: true
      healthCheck: true

  # NOTE: no global cache block here - gateway.cache is NOT rendered by the
  # chart templates (dead value). Route-level caching (incl. Redis Sentinel)
  # is configured through APIRoute/GRPCRoute CRDs in operator mode.

  # No inline routes - all config comes from CRDs via operator
  routes: []

  # No inline backends - all config comes from CRDs via operator
  backends: []

  # No inline gRPC routes - all config comes from CRDs via operator
  grpcRoutes: []

  # No inline gRPC backends - all config comes from CRDs via operator
  grpcBackends: []

  # No inline GraphQL routes - all config comes from CRDs via operator
  graphqlRoutes: []

  # No inline GraphQL backends - all config comes from CRDs via operator
  graphqlBackends: []

  # OpenAPI request validation - disabled by default for local testing
  # Enable and provide spec file to test validation
  openAPIValidation:
    enabled: false

  # Global rate limit defaults — perf-friendly for local load testing.
  # 100 rps capped every PT suite run at ~97% 429 through a single
  # port-forward client; 5000/10000 keeps the limiter exercised without
  # choking throughput (route-level limits still apply where configured).
  rateLimit:
    enabled: true
    requestsPerSecond: 5000
    burst: 10000
    perClient: true

  # Global circuit breaker defaults
  circuitBreaker:
    enabled: true
    threshold: 5
    timeout: 30s
    halfOpenRequests: 3

  # Security headers
  security:
    enabled: true
    headers:
      enabled: true
      xFrameOptions: "DENY"
      xContentTypeOptions: "nosniff"
      xXSSProtection: "1; mode=block"
    hsts:
      enabled: false

  # CORS configuration
  cors:
    allowOrigins:
      - "*"
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowHeaders:
      - Content-Type
      - Authorization
      - X-Request-ID
      - X-API-Key
    exposeHeaders:
      - X-Request-ID
    maxAge: 86400
    allowCredentials: false

  # Audit logging
  audit:
    enabled: true
    output: stdout
    format: json
    level: info
    events:
      authentication: true
      authorization: true
      request: false
      response: false
      configuration: true
      security: true
    skipPaths:
      - /health
      - /metrics
      - /ready
      - /live
    redactFields:
      - password
      - secret
      - token
      - authorization
      - cookie

  # Observability
  observability:
    metrics:
      enabled: true
      path: /metrics
      port: 9090
    tracing:
      enabled: true
      samplingRate: 1.0
      # OTLP gRPC endpoint of the otel-collector chart
      # (test/monitoring/otel-collector) deployed into avapigw-test; the
      # collector forwards traces to the docker-compose Tempo on the host.
      otlpEndpoint: "otel-collector.avapigw-test.svc:4317"
      # The in-cluster test collector serves PLAINTEXT OTLP gRPC. Without
      # this explicit override the gateway's tri-state transport resolution
      # defaults non-loopback endpoints to TLS (secure-by-default) and the
      # export would fail against the plaintext collector.
      otlpInsecure: true
      serviceName: avapigw
    logging:
      level: info
      format: json

# =============================================================================
# Vault Configuration
# =============================================================================
# Vault PKI provides TLS certificates for HTTP and gRPC listeners.
# Kubernetes auth is used for local testing with Docker Desktop K8s.
# The gateway authenticates to Vault using its K8s service account token.
#
# Prerequisites:
#   - Run: ./test/performance/scripts/setup-vault-k8s.sh --namespace=avapigw-test --setup-pki
#   - This creates Vault K8s auth role "avapigw" bound to SA "avapigw" in NS "avapigw-test"
vault:
  enabled: true
  address: "http://host.docker.internal:8200"
  authMethod: kubernetes
  role: "avapigw"
  kubernetesMountPath: "kubernetes"
  pki:
    enabled: true
    pkiMount: "pki"
    role: "test-role"
    commonName: "gateway.avapigw.local"
    altNames:
      - "localhost"
      - "host.docker.internal"
    ttl: "720h"
    renewBefore: "1h"
    grpc:
      enabled: true
      commonName: "grpc.avapigw.local"
      altNames:
        - "localhost"
        - "host.docker.internal"
      ttl: "720h"

# =============================================================================
# Operator Configuration for Local Testing
# =============================================================================
# Enable the operator to test CRD-based configuration management.
# When enabled, you can manage routes and backends using Kubernetes CRDs.
#
# Prerequisites:
#   - CRDs are automatically installed from helm/avapigw/crds/
#   - Build operator image for local use (matches image.repository/tag below):
#       docker build -f Dockerfile.operator -t avapigw-operator:latest .
#
# Usage:
#   helm upgrade --install avapigw helm/avapigw/ -f helm/avapigw/values-local.yaml -n avapigw-test --create-namespace

operator:
  # Enable operator for local testing
  enabled: true

  replicaCount: 1

  image:
    repository: avapigw-operator
    pullPolicy: Never
    tag: "latest"

  # Leader election configuration
  leaderElection:
    enabled: true
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s
    resourceName: avapigw-operator-leader.avapigw.io

  # gRPC server configuration - Vault PKI TLS (kubernetes auth).
  # setup-vault-k8s.sh configures Vault k8s auth against the local
  # Docker Desktop cluster (kubernetes.docker.internal:6443), so the operator
  # authenticates with its ServiceAccount token and issues its gRPC serving
  # certificate from the pki mount (role test-role). The PKI CA is STABLE
  # across operator restarts, so the gateway can verify the connection
  # against the avapigw-vault-pki-ca Secret (see gateway.operatorMode above).
  grpc:
    port: 9444
    requireClientCert: false
    tls:
      mode: vault
      vault:
        pkiMount: pki
        role: test-role

  # Webhook configuration - ENABLED (matches the production posture).
  # The validating webhook is safe to run locally since the finalizer-deadlock
  # fix; it validates APIRoute/Backend/GRPCRoute/GRPCBackend/GraphQL* CRs.
  # tls.mode drives the operator --cert-provider flag when webhooks are
  # enabled, so it must be "vault" too (one cert manager serves both the
  # webhook and the gRPC server; the CA injector publishes the Vault PKI CA
  # into the ValidatingWebhookConfiguration).
  webhook:
    enabled: true
    port: 9443
    tls:
      mode: vault
      vault:
        pkiMount: pki
        role: test-role

  # Vault integration - enabled with Kubernetes auth for local testing.
  # Provides VAULT_ADDR / VAULT_K8S_ROLE for the vault certificate provider
  # (grpc/webhook tls.mode=vault above). The k8s auth role "avapigw-operator"
  # is bound to this ServiceAccount by setup-vault-k8s.sh.
  vault:
    enabled: true
    address: "http://host.docker.internal:8200"
    authMethod: kubernetes
    role: "avapigw-operator"
    kubernetesMountPath: kubernetes

  # NOTE: certificate identity (CERT_SERVICE_NAME / CERT_DNS_NAMES) is
  # rendered by the chart automatically: with the vault cert provider the CN
  # and SANs use FQDN forms (<svc>.<ns>.svc[.cluster.local]) covering BOTH
  # the webhook and the operator gRPC services, matching the Vault PKI
  # test-role "svc" allowed domain.

  # Metrics configuration
  metrics:
    enabled: true
    port: 8080

  # Health probes configuration
  health:
    port: 8081

  # Service configuration
  service:
    type: ClusterIP
    annotations: {}

  # Reduced resources for local testing
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  # Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /healthz
      port: health
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  # Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /readyz
      port: health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532

  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL

  # ServiceAccount configuration
  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""

  # Pod Disruption Budget - disabled for local testing
  podDisruptionBudget:
    enabled: false

  # Node selector, tolerations, affinity - empty for local testing
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Ingress controller - disabled by default for local testing
  ingressController:
    enabled: false
    className: avapigw
    isDefaultClass: false
    lbAddress: ""

  # ServiceMonitor - disabled for local testing
  serviceMonitor:
    enabled: false

  # Network policies - disabled for local testing
  networkPolicy:
    enabled: false

# =============================================================================
# Volume Mounts for Validation Specs
# =============================================================================
# Mount OpenAPI spec ConfigMap as a volume so the gateway can load specs
# from the filesystem for request validation.
#
# Prerequisites:
#   kubectl apply -f test/performance/operator/openapi-spec-configmap.yaml -n avapigw-test

# Additional volumes for the gateway pod
volumes:
  - name: openapi-specs
    configMap:
      name: items-openapi-spec

# Additional volume mounts for the gateway container
volumeMounts:
  - name: openapi-specs
    mountPath: /app/openapi
    readOnly: true
