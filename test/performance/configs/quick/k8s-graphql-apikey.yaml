# Yandex Tank: K8s GraphQL API Key - Quick Test (30 seconds)
phantom:
  package: yandextank.plugins.Phantom
  enabled: true
  address: host.docker.internal:30205
  load_profile:
    load_type: rps
    schedule: line(5, 50, 10s) const(50, 10s) line(50, 5, 10s)
  ammofile: /var/loadtest/ammo/k8s-graphql-apikey.txt
  ammo_type: phantom
  connection_test: true
  writelog: "0"
  ssl: true
  timeout: 15s
  instances: 50
  threads: 2
  header_http: "1.1"
  headers:
    - "[Host: avapigw.local]"
    - "[User-Agent: YandexTank/K8s-GraphQL-APIKey]"
    - "[Content-Type: application/json]"
    - "[Accept: application/json]"
    - "[Connection: keep-alive]"

console:
  package: yandextank.plugins.Console
  enabled: true
  short_only: true

telegraf:
  package: yandextank.plugins.Telegraf
  enabled: false

autostop:
  package: yandextank.plugins.Autostop
  enabled: true
  autostop:
    - http(5xx,50%,10s)
    - time(10000,80%,10s)
    - http(net,30%,10s)
