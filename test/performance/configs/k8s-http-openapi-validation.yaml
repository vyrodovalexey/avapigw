# Yandex Tank Configuration: K8s HTTP OpenAPI Validation Throughput Test
# Purpose: Measure HTTP throughput with OpenAPI request validation enabled
# Duration: 3 minutes total (30s warmup + 2m sustain + 30s cooldown)
# Target: Conservative load for local K8s (Docker Desktop)
#
# This test measures the performance impact of OpenAPI request validation.
# Requests are validated against an OpenAPI specification before being
# forwarded to the backend.
#
# Note: The address port is dynamically replaced by run-k8s-test.sh
# with the actual K8s NodePort discovered via kubectl.
# SSL is disabled for perftest deployment (no Vault PKI).
#
# Prerequisites:
#   - Deploy gateway with OpenAPI validation enabled
#   - Create ConfigMap with OpenAPI spec:
#     kubectl create configmap items-openapi-spec --from-file=openapi.yaml -n avapigw-test
#   - Apply CRD with openAPIValidation enabled

phantom:
  package: yandextank.plugins.Phantom
  enabled: true
  address: host.docker.internal:8443
  load_profile:
    load_type: rps
    # 3-minute test for local K8s:
    # Warmup: 30s ramp from 10 to 150 RPS (lower than baseline due to validation overhead)
    # Sustain: 2m at 150 RPS
    # Cooldown: 30s ramp down
    schedule: line(10, 150, 30s) const(150, 2m) line(150, 10, 30s)

  ammofile: /var/loadtest/ammo/http-get-validated.txt
  ammo_type: uri

  # Connection settings - SSL disabled for perftest deployment
  connection_test: true
  writelog: "0"
  ssl: false
  timeout: 10s

  # Instance settings - conservative for local K8s
  instances: 100
  threads: 4

  # HTTP settings
  header_http: "1.1"
  headers:
    - "[Host: localhost]"
    - "[User-Agent: YandexTank/K8sPerftest]"
    - "[Accept: application/json]"
    - "[Content-Type: application/json]"
    - "[Connection: keep-alive]"
    - "[X-Perf-Test: k8s-http-openapi-validation]"

console:
  package: yandextank.plugins.Console
  enabled: true
  short_only: false

telegraf:
  package: yandextank.plugins.Telegraf
  enabled: false

autostop:
  package: yandextank.plugins.Autostop
  enabled: true
  autostop:
    # Stop if HTTP 5xx errors exceed 15% for 15 seconds
    - http(5xx,15%,15s)
    # Stop if 50% of requests exceed 5000ms for 15 seconds
    - time(5000,50%,15s)
    # Stop if total network errors exceed 10% for 15 seconds
    - http(net,10%,15s)
    # Stop if HTTP 4xx errors exceed 20% for 15 seconds (validation failures)
    - http(4xx,20%,15s)
