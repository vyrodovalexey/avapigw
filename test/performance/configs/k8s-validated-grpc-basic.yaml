# Yandex Tank: K8s gRPC + Proto Validation Baseline (3 minutes)
# Purpose: Measure gRPC throughput with protobuf descriptor-based request validation
# Route: perf-validated-grpc-basic → gRPC service with proto validation
# Validation: Proto descriptor validation on request messages
# Note: gRPC tests use ghz tool, not Yandex Tank. This config is for reference.
#       Use run-validation-perftest.sh --scenario=grpc-basic to run via ghz.
phantom:
  package: yandextank.plugins.Phantom
  enabled: true
  address: host.docker.internal:30150
  load_profile:
    load_type: rps
    schedule: line(10, 150, 30s) const(150, 2m) line(150, 10, 30s)
  ammofile: /var/loadtest/ammo/http-get.txt
  ammo_type: uri
  connection_test: true
  writelog: "0"
  ssl: true
  timeout: 10s
  instances: 100
  threads: 4
  header_http: "1.1"
  headers:
    - "[Host: localhost]"
    - "[User-Agent: YandexTank/K8sPerftest]"
    - "[Accept: application/json]"
    - "[Content-Type: application/grpc]"
    - "[Connection: keep-alive]"

console:
  package: yandextank.plugins.Console
  enabled: true
  short_only: false

telegraf:
  package: yandextank.plugins.Telegraf
  enabled: false

autostop:
  package: yandextank.plugins.Autostop
  enabled: true
  autostop:
    - http(5xx,15%,15s)
    - time(5000,50%,15s)
    - http(net,10%,15s)
