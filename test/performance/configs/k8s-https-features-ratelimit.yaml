# Yandex Tank: K8s HTTPS Rate Limiting (3 minutes)
# Purpose: HTTPS with rate limiting via Redis Sentinel (200 req/s, burst 400)
phantom:
  package: yandextank.plugins.Phantom
  enabled: true
  address: host.docker.internal:30205
  load_profile:
    load_type: rps
    schedule: line(10, 500, 30s) const(500, 2m) line(500, 10, 30s)
  ammofile: /var/loadtest/ammo/k8s-https-ratelimit.txt
  ammo_type: uri
  connection_test: true
  writelog: "0"
  ssl: true
  timeout: 15s
  instances: 200
  threads: 4
  header_http: "1.1"

console:
  package: yandextank.plugins.Console
  enabled: true
  short_only: false

telegraf:
  package: yandextank.plugins.Telegraf
  enabled: false

autostop:
  package: yandextank.plugins.Autostop
  enabled: true
  autostop:
    - time(5000,50%,15s)
    - http(net,10%,15s)
