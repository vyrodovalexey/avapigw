# =============================================================================
# Performance Test GraphQL Backends (for reference/documentation)
# =============================================================================

---
# perf-graphql-backend: Load-balanced GraphQL backend for performance testing
# This backend is already defined in crds-perftest.yaml as perf-graphql-backend-1 and perf-graphql-backend-2
apiVersion: avapigw.io/v1alpha1
kind: GraphQLBackend
metadata:
  name: perf-graphql-backend
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: graphql-backend
    purpose: performance-testing
spec:
  hosts:
    - address: host.docker.internal
      port: 8901
      weight: 50
    - address: host.docker.internal
      port: 8902
      weight: 50
  healthCheck:
    path: /health
    interval: 10s
    timeout: 5s
    healthyThreshold: 2
    unhealthyThreshold: 3
  loadBalancer:
    algorithm: roundRobin

# =============================================================================
# Performance Test GraphQL Routes
# =============================================================================
# NOTE: These routes are for documentation purposes. The actual GraphQL handler
# only matches exact /graphql path. Routes with different paths would be handled
# as regular HTTP routes, not GraphQL routes.

---
# perf-graphql-basic-route: Basic GraphQL route (no auth, no features)
# This is the primary route used for all GraphQL performance tests
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: perf-graphql-basic-route
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: graphql-route
    feature: basic
spec:
  match:
    - path:
        exact: /graphql
  route:
    - destination:
        host: perf-graphql-backend
        port: 8801
      weight: 100
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  introspectionEnabled: true

---
# perf-graphql-oidc-route: GraphQL with OIDC authentication
# NOTE: Per-route auth is NOT enforced by GraphQL handler - only global middleware applies
# This route documents the intended auth configuration for reference
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: perf-graphql-oidc-route
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: graphql-route
    feature: oidc-auth
spec:
  match:
    - path:
        exact: /graphql
      # Match when Authorization header has Bearer prefix (OIDC token)
      headers:
        - name: Authorization
          prefix: "Bearer "
  route:
    - destination:
        host: perf-graphql-backend
        port: 8801
      weight: 100
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  authentication:
    enabled: true
    jwt:
      enabled: true
      issuer: http://localhost:8090/realms/gateway-test
      jwksUrl: http://host.docker.internal:8090/realms/gateway-test/protocol/openid-connect/certs
      audience:
        - account

---
# perf-graphql-apikey-route: GraphQL with API key authentication
# NOTE: Per-route auth is NOT enforced by GraphQL handler - only global middleware applies
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: perf-graphql-apikey-route
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: graphql-route
    feature: apikey-auth
spec:
  match:
    - path:
        exact: /graphql
      # Match when X-API-Key header has pk_ prefix
      headers:
        - name: X-API-Key
          prefix: "pk_"
  route:
    - destination:
        host: perf-graphql-backend
        port: 8801
      weight: 100
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  authentication:
    enabled: true
    apiKey:
      enabled: true
      header: X-API-Key
      vaultPath: secret/data/perftest/apikeys

---
# perf-graphql-ratelimit-route: GraphQL with per-route rate limiting
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: perf-graphql-ratelimit-route
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: graphql-route
    feature: ratelimit
spec:
  match:
    - path:
        exact: /graphql
  route:
    - destination:
        host: perf-graphql-backend
        port: 8801
      weight: 100
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  rateLimit:
    enabled: true
    requestsPerSecond: 50
    burst: 100

---
# perf-graphql-transform-route: GraphQL with header manipulation
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: perf-graphql-transform-route
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: graphql-route
    feature: transform
spec:
  match:
    - path:
        exact: /graphql
  route:
    - destination:
        host: perf-graphql-backend
        port: 8801
      weight: 100
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  headers:
    request:
      set:
        x-gateway: avapigw
        x-perf-test: graphql-transform
