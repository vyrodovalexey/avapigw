# GraphQL Performance Test CRD Manifests
# ========================================
#
# IMPORTANT: This file documents the GraphQL CRD architecture for performance testing.
#
# ARCHITECTURE NOTES:
# -------------------
# The GraphQL handler in the gateway is registered ONLY for the exact path `/graphql`.
# Routes with paths like `/graphql/perf/basic` will NOT be handled by the GraphQL handler -
# they'll go through the NoRoute handler (regular HTTP proxy).
#
# Therefore, ALL GraphQL performance tests use the existing `/graphql` path.
# Different test variants are differentiated by:
# 1. Different ammo files with different headers (auth headers, custom headers)
# 2. Different load profiles in Yandex Tank configs
#
# EXISTING GRAPHQL ROUTES IN K8S:
# -------------------------------
# - graphql-basic: path exact /graphql, backends noauth-1 + noauth-2 (no auth)
# - basic-graphql-route: path exact /graphql, backend basic-graphql-backend
# - full-graphql-route: path exact /graphql, with JWT auth, RBAC, headers, etc.
#
# The `graphql-basic` route handles all `/graphql` requests without authentication.
# Per-route auth is NOT enforced by the GraphQL handler code - only global middleware applies.
#
# EXPECTED BEHAVIOR:
# ------------------
# 1. Backend returns 404 because it doesn't have a `/graphql` endpoint - this is EXPECTED
# 2. Global rate limiter (100 req/s burst 200) may return 429 - this is EXPECTED
# 3. Auth headers in ammo files are passed through but NOT validated at route level
#    (only global middleware applies)
#
# PERFORMANCE TEST SCENARIOS:
# ---------------------------
# 1. k8s-graphql-basic: Baseline GraphQL throughput (no auth headers)
# 2. k8s-graphql-oidc: GraphQL with OIDC Bearer token header
# 3. k8s-graphql-apikey: GraphQL with X-API-Key header
# 4. k8s-graphql-basicauth: GraphQL with Basic auth header
# 5. k8s-graphql-ratelimit: GraphQL rate limiting test (higher load profile)
# 6. k8s-graphql-transform: GraphQL with custom headers
#
# NO NEW CRDs NEEDED:
# -------------------
# All tests use the existing `graphql-basic` route at `/graphql`.
# The ammo files and Yandex Tank configs differentiate the test scenarios.
#
# Apply with: kubectl apply -f test/performance/operator/crds-graphql-perftest.yaml -n avapigw-test

