# Performance Test CRD Manifests for Validation Features
# This file contains comprehensive CRD manifests for performance testing
# of OpenAPI, Proto, and GraphQL schema validation combined with other
# gateway features (rate limiting, caching, auth, CORS, transforms, etc.).
#
# Prerequisites:
#   - Apply OpenAPI spec ConfigMap:
#     kubectl apply -f test/performance/operator/openapi-spec-configmap.yaml -n avapigw-test
#   - Mount the ConfigMap as a volume at /app/openapi/ in the gateway pod
#     (see helm/avapigw/values-local.yaml for volume configuration)
#
# Apply with: kubectl apply -f test/performance/operator/crds-validation-perftest.yaml -n avapigw-test

# =============================================================================
# HTTP Routes with OpenAPI Validation
# =============================================================================

---
# 1. perf-validated-http-basic: OpenAPI validation + basic proxy (baseline with validation)
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: perf-validated-http-basic
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-http-route
    feature: openapi-basic
spec:
  match:
    - uri:
        prefix: /api/v1/validated/basic/items
      methods:
        - GET
        - POST
        - PUT
        - DELETE
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 50
    - destination:
        host: host.docker.internal
        port: 8802
      weight: 50
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specFile: /app/openapi/items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
    validateRequestHeaders: false
    validateSecurity: false

---
# 2. perf-validated-http-ratelimit: OpenAPI validation + rate limiting via Redis Sentinel
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: perf-validated-http-ratelimit
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-http-route
    feature: openapi-ratelimit
spec:
  match:
    - uri:
        prefix: /api/v1/validated/ratelimit/items
      methods:
        - GET
        - POST
        - PUT
        - DELETE
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 100
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specFile: /app/openapi/items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  rateLimit:
    enabled: true
    requestsPerSecond: 100
    burst: 200
    perClient: true

---
# 3. perf-validated-http-cache: OpenAPI validation + caching via Redis Sentinel
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: perf-validated-http-cache
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-http-route
    feature: openapi-cache
spec:
  match:
    - uri:
        prefix: /api/v1/validated/cache/items
      methods:
        - GET
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 50
    - destination:
        host: host.docker.internal
        port: 8802
      weight: 50
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specFile: /app/openapi/items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  cache:
    enabled: true
    ttl: 5m
    keyComponents:
      - path
      - query

---
# 4. perf-validated-http-transform: OpenAPI validation + request/response transformation
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: perf-validated-http-transform
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-http-route
    feature: openapi-transform
spec:
  match:
    - uri:
        prefix: /api/v1/validated/transform/items
      methods:
        - GET
        - POST
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 100
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specFile: /app/openapi/items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  transform:
    request:
      template: |
        {"wrapped": {{.Body}}}
    response:
      allowFields:
        - id
        - name
      denyFields:
        - password
        - secret

---
# 5. perf-validated-http-encoding: OpenAPI validation + encoding
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: perf-validated-http-encoding
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-http-route
    feature: openapi-encoding
spec:
  match:
    - uri:
        prefix: /api/v1/validated/encoding/items
      methods:
        - GET
