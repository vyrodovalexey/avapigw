# =============================================================================
# GraphQL Routes with Schema Validation
# =============================================================================

---
# 17. perf-validated-graphql-basic: Schema validation + basic GraphQL proxy
# NOTE: GraphQL routes must use the gateway's GraphQL handler path (/graphql).
# The gateway registers a single GraphQL handler; routes differentiate by
# operation name, type, or headers — not by URL path.
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: perf-validated-graphql-basic
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-graphql-route
    feature: schema-basic
spec:
  match:
    - path:
        exact: /graphql
      operationName:
        prefix: "Validated"
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 50
    - destination:
        host: host.docker.internal
        port: 8802
      weight: 50
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  introspectionEnabled: true
  schemaValidation:
    enabled: true
    schemaFile: /app/graphql/schema.graphql
    failOnError: true
    validateVariables: true

---
# 18. perf-validated-graphql-ratelimit: Schema validation + rate limiting
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: perf-validated-graphql-ratelimit
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-graphql-route
    feature: schema-ratelimit
spec:
  match:
    - path:
        exact: /graphql
      operationName:
        prefix: "ValidatedRL"
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 100
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  schemaValidation:
    enabled: true
    schemaFile: /app/graphql/schema.graphql
    failOnError: true
    validateVariables: true
  rateLimit:
    enabled: true
    requestsPerSecond: 100
    burst: 200

---
# 19. perf-validated-graphql-oidc: Schema validation + OIDC authentication
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: perf-validated-graphql-oidc
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-graphql-route
    feature: schema-oidc
spec:
  match:
    - path:
        exact: /graphql
      operationName:
        prefix: "ValidatedOIDC"
      headers:
        - name: Authorization
          prefix: "Bearer "
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 100
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  schemaValidation:
    enabled: true
    schemaFile: /app/graphql/schema.graphql
    failOnError: true
    validateVariables: true
  authentication:
    enabled: true
    jwt:
      enabled: true
      issuer: http://localhost:8090/realms/gateway-test
      jwksUrl: http://host.docker.internal:8090/realms/gateway-test/protocol/openid-connect/certs
      audience:
        - account

---
# 20. perf-validated-graphql-apikey: Schema validation + API key authentication
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: perf-validated-graphql-apikey
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-graphql-route
    feature: schema-apikey
spec:
  match:
    - path:
        exact: /graphql
      operationName:
        prefix: "ValidatedKey"
      headers:
        - name: X-API-Key
          prefix: ""
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 100
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  schemaValidation:
    enabled: true
    schemaFile: /app/graphql/schema.graphql
    failOnError: true
    validateVariables: true
  authentication:
    enabled: true
    apiKey:
      enabled: true
      header: X-API-Key
      vaultPath: secret/data/perftest/apikeys
