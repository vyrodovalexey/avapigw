  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 100
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specFile: /app/openapi/items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  encoding:
    request:
      contentType: application/json
    response:
      contentType: application/json

---
# 6. perf-validated-http-cors: OpenAPI validation + CORS
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: perf-validated-http-cors
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-http-route
    feature: openapi-cors
spec:
  match:
    - uri:
        prefix: /api/v1/validated/cors/items
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 50
    - destination:
        host: host.docker.internal
        port: 8802
      weight: 50
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specFile: /app/openapi/items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  cors:
    allowOrigins:
      - "*"
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowHeaders:
      - Content-Type
      - Authorization
      - X-API-Key
    exposeHeaders:
      - X-Request-ID
    maxAge: 86400
    allowCredentials: false

---
