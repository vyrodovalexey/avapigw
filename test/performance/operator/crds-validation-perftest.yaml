# =============================================================================
# gRPC Routes with Proto Validation
# =============================================================================

---
# 13. perf-validated-grpc-basic: Proto validation + basic gRPC proxy
apiVersion: avapigw.io/v1alpha1
kind: GRPCRoute
metadata:
  name: perf-validated-grpc-basic
  namespace: avapigw-test
  labels:
    app: avapigw-perftest
    component: validated-grpc-route
    feature: proto-basic
spec:
  match:
    - service:
        exact: api.v1.ValidatedService
      method:
        prefix: ""
  route:
    - destination:
        host: host.docker.internal
        port: 8811
      weight: 50
    - destination:
        host: host.docker.internal
        port: 8812
      weight: 50
  timeout: 30s
  protoValidation:
    enabled: true
    descriptorFile: /app/proto/test-service.pb
    failOnError: true
    validateRequestMessage: true

---
