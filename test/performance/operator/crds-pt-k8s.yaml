# =============================================================================
# PT suite (PT-01..PT-06) fixture CRDs for the OPERATOR-MODE k8s gateway
# =============================================================================
# Operator-mode translation of test/performance/configs/gateway-pt-local.yaml
# (the canonical PT scenario definition used by the 20260715/16 local runs)
# for the avapigw-test deployment driven by scripts/run-pt-suite.sh.
#
# Designed to COEXIST with test/k8s/crds-full-test.yaml (43 CRs) without
# route-table hijacks — every route here was checked against the router
# priority rules (internal/router, internal/grpc/router, internal/graphql/router):
#   * HTTP:    distinct path prefixes (no overlap with full-test routes)
#   * gRPC:    api.v1.TestService + metadata conditions; pt-grpc-oidc carries
#              TWO metadata conditions (priority 1020) so it outranks the
#              full-test grpc-cached route (TestService+authorization = 1010)
#   * GraphQL: exact /graphql + one header condition each (specificity 1010)
#              outranks graphql-basic (1000); scenarios are disjoint by header
#
# Scenario map (run-*-group.sh):
#   PT-01/02 ghz  -> pt-grpc-baseline (x-perf-baseline), pt-grpc-oidc
#                    (x-test-scenario=oidc + Bearer), pt-grpc-mtls
#                    (x-test-scenario=mtls*), pt-grpc-aggregate (x-perf-aggregate)
#   PT-03/04 hey  -> pt-validated-{basic,apikey,oidc,ratelimit,transform,
#                    encoding,cache,cors}; k6 -> /ws (full-test websocket-plain),
#                    pt-ws-apikey, pt-ws-oidc; PT-04 adds pt-aggregate-rest
#                    (/api/v1/items fan-out) + pt-ndjson-aggregate (/aggregate-ndjson)
#   PT-05/06 hey  -> pt-graphql-{basic,oidc,apikey,ratelimit,transform,cors};
#                    PT-06 adds pt-graphql-aggregate (X-Perf-Scenario: aggregate)
#
# External dependencies (docker-compose test env on the host):
#   REST backends 8801/8802/8805, gRPC backends 8811/8812/8813(mTLS)
#   Redis Sentinel host.docker.internal:26379-81 (master mymaster, password in
#     Vault KV secret/backend-auth/redis)
#   Keycloak host.docker.internal:8090 (realm gateway-test)
#   Vault KV secret/data/apikeys/<sha256> (perf API key pk_perftest_1234567890abcdef)
#   NDJSON/GraphQL go mock on host ports 8901/8902
#     (go run test/performance/scripts/graphql-mock-server.go)
#   OpenAPI spec ConfigMap items-openapi-spec (key items-api.yaml)
#
# Apply : kubectl apply -f test/performance/operator/crds-pt-k8s.yaml
# Remove: kubectl delete -f test/performance/operator/crds-pt-k8s.yaml
#
# =============================================================================
# PT-03/04 - HTTP feature routes (every route carries OpenAPI validation)
# =============================================================================

---
# basic: gateway->backend BASIC AUTH injection (rest-backend-basic Backend CR
# resolves Vault KV secret/backend-auth/basic) + OpenAPI validation
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-validated-basic
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: backend-basic-auth
spec:
  match:
    - uri:
        prefix: /api/v1/validated/basic/items
      methods: [GET, POST]
  route:
    - destination:
        host: rest-backend-basic
        port: 8805
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specConfigMapRef:
      name: items-openapi-spec
      key: items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true

---
# apikey: client API-key auth against Vault KV sha256 hash store
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-validated-apikey
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: auth-apikey
spec:
  match:
    - uri:
        prefix: /api/v1/validated/apikey/items
      methods: [GET, POST]
  route:
    - destination:
        host: host.docker.internal
        port: 8801
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specConfigMapRef:
      name: items-openapi-spec
      key: items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  authentication:
    enabled: true
    apiKey:
      enabled: true
      header: X-API-Key
      hashAlgorithm: sha256
      vaultPath: secret/data/apikeys

---
# oidc: client JWT auth (Keycloak gateway-test realm, token issued via localhost)
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-validated-oidc
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: auth-oidc
spec:
  match:
    - uri:
        prefix: /api/v1/validated/oidc/items
      methods: [GET, POST]
  route:
    - destination:
        host: host.docker.internal
        port: 8801
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specConfigMapRef:
      name: items-openapi-spec
      key: items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  authentication:
    enabled: true
    jwt:
      enabled: true
      issuer: http://localhost:8090/realms/gateway-test
      jwksUrl: http://host.docker.internal:8090/realms/gateway-test/protocol/openid-connect/certs
      audience:
        - account

---
# ratelimit: REDIS-SENTINEL-backed rate limit, 5 rps / burst 5 (like the
# verified items-api-redis-rl route) so redis denials are guaranteed under the
# global limiter's ~100 rps pass-through share -> both
# gateway_middleware_redis_rate_limit_allowed_total AND _denied_total move.
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-validated-ratelimit
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: ratelimit-sentinel
spec:
  match:
    - uri:
        prefix: /api/v1/validated/ratelimit/items
      methods: [GET, POST]
  route:
    - destination:
        host: host.docker.internal
        port: 8801
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specConfigMapRef:
      name: items-openapi-spec
      key: items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  rateLimit:
    enabled: true
    requestsPerSecond: 5
    burst: 5
    perClient: false
    store: redis
    redis:
      sentinel:
        masterName: mymaster
        sentinelAddrs:
          - host.docker.internal:26379
          - host.docker.internal:26380
          - host.docker.internal:26381
        passwordVaultPath: secret/backend-auth/redis
      keyPrefix: "pt:rl:http:"
      failOpen: true

---
# transform: request static header + response field filtering
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-validated-transform
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: transform
spec:
  match:
    - uri:
        prefix: /api/v1/validated/transform/items
      methods: [GET, POST]
  route:
    - destination:
        host: host.docker.internal
        port: 8801
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specConfigMapRef:
      name: items-openapi-spec
      key: items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  # NOTE: the admission webhook forbids allowFields+denyFields together on
  # APIRoute (file-mode gateway config allows both - see report finding); the
  # allow-list alone still exercises the response transform path.
  transform:
    request:
      staticHeaders:
        X-Perf-Transform: pt-k8s
    response:
      allowFields:
        - data

---
# encoding: response transcode json->xml (CRD encoding supports contentType
# transcode only; compression/negotiation are file-config-only features).
# The xml transcode guarantees gateway_encoding_encode_total increments.
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-validated-encoding
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: encoding
spec:
  match:
    - uri:
        prefix: /api/v1/validated/encoding/items
      methods: [GET, POST]
  route:
    - destination:
        host: host.docker.internal
        port: 8801
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specConfigMapRef:
      name: items-openapi-spec
      key: items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  encoding:
    request:
      contentType: application/json
    response:
      contentType: application/xml

---
# cache: REDIS-SENTINEL-backed response cache (mirrors verified items-api-cached)
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-validated-cache
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: cache-sentinel
spec:
  match:
    - uri:
        prefix: /api/v1/validated/cache/items
      methods: [GET]
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 50
    - destination:
        host: host.docker.internal
        port: 8802
      weight: 50
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specConfigMapRef:
      name: items-openapi-spec
      key: items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  cache:
    enabled: true
    ttl: 60s
    keyConfig:
      includeMethod: true
      includePath: true
    type: redis
    redis:
      sentinel:
        masterName: mymaster
        sentinelAddrs:
          - host.docker.internal:26379
          - host.docker.internal:26380
          - host.docker.internal:26381
        passwordVaultPath: secret/backend-auth/redis
      keyPrefix: "pt:cache:"
      ttlJitter: 0.2
      hashKeys: false

---
# cors: route-level CORS (NOTE: global CORS "*" from values-local shadows the
# route-level preflight answer - known finding #4 of the devops phase; the
# scenario still exercises the CORS middleware + metrics)
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-validated-cors
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: cors
spec:
  match:
    - uri:
        prefix: /api/v1/validated/cors/items
      methods: [GET, POST, OPTIONS]
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 50
    - destination:
        host: host.docker.internal
        port: 8802
      weight: 50
  rewrite:
    uri: /api/v1/items
  timeout: 30s
  openAPIValidation:
    enabled: true
    specConfigMapRef:
      name: items-openapi-spec
      key: items-api.yaml
    failOnError: true
    validateRequestBody: true
    validateRequestParams: true
  cors:
    allowOrigins: ["*"]
    allowMethods: [GET, POST, OPTIONS]
    allowHeaders: [Content-Type, Authorization, X-API-Key, Origin]
    exposeHeaders: [X-Request-ID]
    maxAge: 86400
    allowCredentials: false

# =============================================================================
# PT-03/04 - WebSocket routes (plain /ws comes from full-test websocket-plain)
# =============================================================================

---
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-ws-apikey
  namespace: avapigw-test
  labels:
