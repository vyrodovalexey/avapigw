---
# ws-oidc: k6 sends the 127.0.0.1-issued Keycloak token (TOK_IP in the runner)
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-ws-oidc
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: ws-oidc
spec:
  match:
    - uri:
        exact: /ws-perf-oidc
  route:
    - destination:
        host: host.docker.internal
        port: 8801
  rewrite:
    uri: /ws
  timeout: 0s
  authentication:
    enabled: true
    jwt:
      enabled: true
      issuer: http://127.0.0.1:8090/realms/gateway-test
      jwksUrl: http://host.docker.internal:8090/realms/gateway-test/protocol/openid-connect/certs
      audience:
        - account

# =============================================================================
# PT-04 - REST aggregate (mirroring) routes
# =============================================================================

---
# REST fan-out on /api/v1/items: the aggregate handler forwards the inbound
# path VERBATIM to each target (no rewrite), and the REST backends serve
# /api/v1/items. Prefix length 17 outranks the full-test catch-all (prefix /).
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-aggregate-rest
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: aggregate-rest
spec:
  match:
    - uri:
        prefix: /api/v1/items
      methods: [GET, POST]
  route:
    - destination:
        host: host.docker.internal
        port: 8801
      weight: 100
  timeout: 30s
  aggregate:
    enabled: true
    failMode: any
    maxParallel: 4
    merge:
      enabled: true
      strategy: deep
    targets:
      - name: rest-backend-1
        destination:
          host: host.docker.internal
          port: 8801
        timeout: 10s
        retries: 1
      - name: rest-backend-2
        destination:
          host: host.docker.internal
          port: 8802
        timeout: 10s
        retries: 1

---
# NDJSON-strategy fan-out: merges the two host mock NDJSON record streams
# (stable-sorted by _time, de-duplicated first-wins by id, capped at limit).
apiVersion: avapigw.io/v1alpha1
kind: APIRoute
metadata:
  name: pt-ndjson-aggregate
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: aggregate-ndjson
spec:
  match:
    - uri:
        prefix: /aggregate-ndjson
      methods: [GET]
  route:
    - destination:
        host: host.docker.internal
        port: 8901
      weight: 100
  timeout: 30s
  aggregate:
    enabled: true
    failMode: any
    maxParallel: 4
    merge:
      enabled: true
      strategy: ndjson
      timeField: _time
      keyField: id
      limit: 100
    targets:
      - name: ndjson-backend-1
        destination:
          host: host.docker.internal
          port: 8901
        timeout: 10s
        retries: 1
      - name: ndjson-backend-2
        destination:
          host: host.docker.internal
          port: 8902
        timeout: 10s
        retries: 1

# =============================================================================
# PT-01/02 - gRPC routes (TLS listener 9443; deployment has no plaintext gRPC)
# =============================================================================
# WEBHOOK WORKAROUND: the admission duplicate checker for GRPCRoute compares
# ONLY service+method and IGNORES metadata match conditions
# (internal/operator/webhook/duplicate.go grpcMatchConditionsOverlap /
# grpcMethodsOverlap), while the data-plane router orders metadata-
# differentiated routes deterministically (internal/grpc/router calculatePriority
# counts +10 per metadata condition) and the GraphQL checker IS specificity-
# aware for headers. Metadata-only scenario routes on the same service are
# therefore rejected as duplicates (product finding, see PT report).
#
# To stay admissible these routes ALSO differ in method matchers using the
# checker's coexistence rules (exact-vs-prefix never conflicts; distinct
# prefixes never conflict), while metadata still gates the actual match:
#   pt-grpc-oidc      method exact  Unary          + x-test-scenario=oidc
#   pt-grpc-aggregate method prefix "Unary"        + x-perf-aggregate
#   pt-grpc-mtls      method prefix "Una"/"Server" + x-test-scenario prefix mtls
#   pt-grpc-baseline  method prefix "U"/"ServerS"/"Bidirectional" + x-perf-baseline
#
# PREREQUISITE: the full-test route grpc-cached (service exact TestService with
# NO method matcher = matches-all-methods) must be temporarily removed while
# these fixtures are installed, or the webhook rejects every TestService route:
#   kubectl -n avapigw-test delete grpcroute grpc-cached
# Restore after the suite: kubectl apply -f test/k8s/crds-full-test.yaml
# (delete the pt fixtures FIRST - see run-pt-suite.sh restore step).

---
# baseline unary/serverstream/bidistream throughput
apiVersion: avapigw.io/v1alpha1
kind: GRPCRoute
metadata:
  name: pt-grpc-baseline
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: grpc-baseline
spec:
  match:
    - service:
        exact: api.v1.TestService
      method:
        prefix: U
      metadata:
        - name: x-perf-baseline
          present: true
    - service:
        exact: api.v1.TestService
      method:
        prefix: ServerS
      metadata:
        - name: x-perf-baseline
          present: true
    - service:
        exact: api.v1.TestService
      method:
        prefix: Bidirectional
      metadata:
        - name: x-perf-baseline
          present: true
  route:
    - destination:
        host: host.docker.internal
        port: 8811
      weight: 50
    - destination:
        host: host.docker.internal
        port: 8812
      weight: 50
  timeout: 30s

---
# oidc: client Bearer token validated at the gateway (Keycloak JWT)
apiVersion: avapigw.io/v1alpha1
kind: GRPCRoute
metadata:
  name: pt-grpc-oidc
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: grpc-oidc
spec:
  match:
    - service:
        exact: api.v1.TestService
      method:
        exact: Unary
      metadata:
        - name: x-test-scenario
          exact: oidc
        - name: authorization
          present: true
  route:
    - destination:
        host: host.docker.internal
        port: 8811
      weight: 50
    - destination:
        host: host.docker.internal
        port: 8812
      weight: 50
  timeout: 30s
  authentication:
    enabled: true
    jwt:
      enabled: true
      issuer: http://localhost:8090/realms/gateway-test
      jwksUrl: http://host.docker.internal:8090/realms/gateway-test/protocol/openid-connect/certs
      audience:
        - account

---
# PT-owned mTLS GRPCBackend on the docker-desktop host-gateway IPv4 LITERAL.
# WHY: host.docker.internal resolves to A 192.168.65.254 + AAAA fdc4:...::254
# inside this cluster; the mTLS/TLS backend dial path picks the AAAA record and
# fails with "network is unreachable" (plain gRPC backends on the same hostname
# dial fine - IPv6-preference bug in the TLS backend dialer, see PT report).
# Same Vault PKI MUTUAL TLS config as the verified full-test grpc-backend-mtls.
# NOTE: 192.168.65.254 is docker-desktop-specific (matches this test env).
apiVersion: avapigw.io/v1alpha1
kind: GRPCBackend
metadata:
  name: pt-grpc-backend-mtls
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: grpc-backend-mtls
spec:
  hosts:
    - address: 192.168.65.254
      port: 8813
      weight: 1
  healthCheck:
    enabled: true
    service: ""
    interval: 10s
    timeout: 5s
    healthyThreshold: 2
    unhealthyThreshold: 3
  loadBalancer:
    algorithm: roundRobin
  connectionPool:
    maxConnsPerHost: 100
    maxIdleConns: 50
    idleConnTimeout: 90s
  tls:
    enabled: true
    mode: MUTUAL
    insecureSkipVerify: true
    vault:
      enabled: true
      pkiMount: pki
      role: client-role
      commonName: avapigw-client
      altNames:
        - localhost
        - host.docker.internal
      ttl: "720h"

---
# mtls: gateway->backend MUTUAL TLS to grpc_3 :8813 (via pt-grpc-backend-mtls
# above, Vault PKI client cert). Matches x-test-scenario=mtls AND =mtls-stream
# (prefix) for Unary ("Una") and ServerStream ("Server") methods.
# IMPORTANT: the destination host MUST be the GRPCBackend NAME - the gRPC
# director resolves backend features (mTLS/auth/LB) only when
# destination.host == backend name (internal/grpc/proxy/director.go
# resolveTarget/getServiceBackend); literal host destinations dial PLAINTEXT
# and silently drop the backend's TLS config (see PT report finding).
apiVersion: avapigw.io/v1alpha1
kind: GRPCRoute
metadata:
  name: pt-grpc-mtls
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: grpc-backend-mtls
spec:
  match:
    - service:
        exact: api.v1.TestService
      method:
        prefix: Una
      metadata:
        - name: x-test-scenario
          prefix: mtls
    - service:
        exact: api.v1.TestService
      method:
        prefix: Server
      metadata:
        - name: x-test-scenario
          prefix: mtls
  route:
    - destination:
        host: pt-grpc-backend-mtls
        port: 8813
  timeout: 30s

---
# aggregate: gRPC unary fan-out across 8811 + 8812 (the gRPC aggregate
# data-plane adapter is wired in this build via WithGatewayGRPCAggregateHandler)
apiVersion: avapigw.io/v1alpha1
kind: GRPCRoute
metadata:
  name: pt-grpc-aggregate
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: grpc-aggregate
spec:
  match:
    - service:
        exact: api.v1.TestService
      method:
        prefix: Unary
      metadata:
        - name: x-perf-aggregate
          present: true
  route:
    - destination:
        host: host.docker.internal
        port: 8811
      weight: 100
  timeout: 30s
  aggregate:
    enabled: true
    failMode: any
    maxParallel: 4
    targets:
      - name: grpc-backend-1
        destination:
          host: host.docker.internal
          port: 8811
        timeout: 10s
        retries: 1
      - name: grpc-backend-2
        destination:
          host: host.docker.internal
          port: 8812
        timeout: 10s
        retries: 1

# =============================================================================
# PT-05/06 - GraphQL backend + routes (host go mock on 8901/8902)
# =============================================================================

---
apiVersion: avapigw.io/v1alpha1
kind: GraphQLBackend
metadata:
  name: pt-graphql-mock
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
spec:
  hosts:
    - address: host.docker.internal
      port: 8901
      weight: 50
    - address: host.docker.internal
      port: 8902
      weight: 50
  healthCheck:
    path: /health
    interval: 10s
    timeout: 3s
    healthyThreshold: 2
    unhealthyThreshold: 3
  loadBalancer:
    algorithm: roundRobin

---
# basic (X-Perf-Scenario: basic -> specificity 1010 > graphql-basic 1000, so
# the PT baseline uses the same host mock backend as every other PT scenario)
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: pt-graphql-basic
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: graphql-basic
spec:
  match:
    - path:
        exact: /graphql
      headers:
        - name: X-Perf-Scenario
          exact: basic
  route:
    - destination:
        host: pt-graphql-mock
        port: 8901
