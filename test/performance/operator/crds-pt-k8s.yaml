# ratelimit: REDIS-SENTINEL-backed, 5 rps / burst 5 for guaranteed denials
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: pt-graphql-ratelimit
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: graphql-ratelimit-sentinel
spec:
  match:
    - path:
        exact: /graphql
      headers:
        - name: X-Perf-Scenario
          exact: ratelimit
  route:
    - destination:
        host: pt-graphql-mock
        port: 8901
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  rateLimit:
    enabled: true
    requestsPerSecond: 5
    burst: 5
    perClient: false
    store: redis
    redis:
      sentinel:
        masterName: mymaster
        sentinelAddrs:
          - host.docker.internal:26379
          - host.docker.internal:26380
          - host.docker.internal:26381
        passwordVaultPath: secret/backend-auth/redis
      keyPrefix: "pt:rl:graphql:"
      failOpen: true

