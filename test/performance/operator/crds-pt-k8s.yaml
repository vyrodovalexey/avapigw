# aggregate: GraphQL fan-out across both host mock instances, deep data merge
apiVersion: avapigw.io/v1alpha1
kind: GraphQLRoute
metadata:
  name: pt-graphql-aggregate
  namespace: avapigw-test
  labels:
    app: avapigw-pt
    suite: pt-k8s
    feature: graphql-aggregate
spec:
  match:
    - path:
        exact: /graphql
      headers:
        - name: X-Perf-Scenario
          exact: aggregate
  route:
    - destination:
        host: pt-graphql-mock
        port: 8901
  timeout: 30s
  depthLimit: 10
  complexityLimit: 100
  aggregate:
    enabled: true
    failMode: any
    maxParallel: 4
    merge:
      enabled: true
      strategy: deep
    targets:
      - name: graphql-mock-1
        destination:
          host: host.docker.internal
          port: 8901
        timeout: 10s
        retries: 1
      - name: graphql-mock-2
        destination:
          host: host.docker.internal
          port: 8902
        timeout: 10s
        retries: 1
