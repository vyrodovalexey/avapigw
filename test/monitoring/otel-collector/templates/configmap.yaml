apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-collector.fullname" . }}
  labels:
    {{- include "otel-collector.labels" . | nindent 4 }}
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: {{ .Values.receivers.otlp.protocols.grpc.endpoint | quote }}
          http:
            endpoint: {{ .Values.receivers.otlp.protocols.http.endpoint | quote }}

    processors:
      batch:
        timeout: {{ .Values.processors.batch.timeout }}
        send_batch_size: {{ .Values.processors.batch.send_batch_size }}

    exporters:
      prometheusremotewrite:
        endpoint: {{ .Values.exporters.prometheusremotewrite.endpoint | quote }}
        tls:
          insecure: true
      {{- with index .Values.exporters "otlp/tempo" }}
      otlp/tempo:
        endpoint: {{ .endpoint | quote }}
        tls:
          # dig tolerates a deleted/absent exporters."otlp/tempo".tls block
          # (nil-safe); default is plaintext for the local test Tempo.
          insecure: {{ dig "tls" "insecure" true . }}
      {{- end }}
      debug:
        verbosity: {{ .Values.exporters.debug.verbosity }}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: {{ toJson .Values.pipelines.traces.receivers }}
          processors: {{ toJson .Values.pipelines.traces.processors }}
          exporters: {{ toJson .Values.pipelines.traces.exporters }}
        metrics:
          receivers: {{ toJson .Values.pipelines.metrics.receivers }}
          processors: {{ toJson .Values.pipelines.metrics.processors }}
          exporters: {{ toJson .Values.pipelines.metrics.exporters }}
      telemetry:
        logs:
          level: info
        metrics:
          # 'metrics::address' was deprecated in collector v0.104 and removed
          # in the v0.120+ line; internal telemetry is now configured through
          # OpenTelemetry SDK 'readers'. A pull/prometheus reader serves the
          # collector's own metrics on 0.0.0.0:8888 (the port exposed by the
          # deployment/service and scraped via prometheus.io annotations).
          level: {{ .Values.telemetry.metrics.level | default "normal" }}
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
