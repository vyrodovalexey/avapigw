replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.120.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  otlpGrpcPort: 4317
  otlpHttpPort: 4318
  metricsPort: 8888

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

# Exporter targets: the docker-compose VictoriaMetrics (:8428) and Tempo
# OTLP (:4317) on the HOST. host.docker.internal resolves from in-cluster
# pods on Docker Desktop (macOS/Windows) clusters. On other platforms
# override the endpoints at install, e.g.:
#   --set exporters.prometheusremotewrite.endpoint=http://<host-IP>:8428/api/v1/write \
#   --set exporters.otlp/tempo.endpoint=<host-IP>:4317
# (kind/minikube on Linux: docker bridge gateway 172.17.0.1 or the host LAN IP)
exporters:
  prometheusremotewrite:
    endpoint: "http://host.docker.internal:8428/api/v1/write"
  otlp/tempo:
    endpoint: "host.docker.internal:4317"
    tls:
      insecure: true
  debug:
    verbosity: normal

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

# Collector internal telemetry (service::telemetry).
# metrics.level: none | basic | normal | detailed
telemetry:
  metrics:
    level: normal

pipelines:
  traces:
    receivers: ["otlp"]
    processors: ["batch"]
    exporters: ["otlp/tempo", "debug"]
  metrics:
    receivers: ["otlp"]
    processors: ["batch"]
    exporters: ["prometheusremotewrite"]

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

serviceAccount:
  create: true
  name: ""
