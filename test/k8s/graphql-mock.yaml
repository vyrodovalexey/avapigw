# =============================================================================
# Minimal in-cluster GraphQL mock backend for avapigw GraphQL route verification
# =============================================================================
# The docker-compose REST backends (ghcr.io/vyrodovalexey/restapi-example) do
# NOT serve /graphql, so GraphQLRoute/GraphQLBackend CRs are verified against
# this tiny in-cluster mock instead (same contract as the e2e mock in
# test/helpers/graphql_helpers.go: POST /graphql -> 200 {"data": ...},
# GET /health -> 200).
#
# Apply with: kubectl apply -f test/k8s/graphql-mock.yaml
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: graphql-mock-server
  namespace: avapigw-test
  labels:
    app.kubernetes.io/name: graphql-mock
    app.kubernetes.io/part-of: avapigw-test
data:
  server.py: |
    """Minimal GraphQL mock: POST /graphql -> {"data": ...}, GET /health -> ok."""
    import json
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    class Handler(BaseHTTPRequestHandler):
        protocol_version = "HTTP/1.1"

        def _send(self, code, payload):
            body = json.dumps(payload).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path in ("/health", "/ready"):
                self._send(200, {"status": "ok"})
            else:
                self._send(404, {"error": "not found"})

        def do_POST(self):
            if self.path != "/graphql":
                self._send(404, {"error": "not found"})
                return
            length = int(self.headers.get("Content-Length", 0))
            raw = self.rfile.read(length) if length else b"{}"
            try:
                req = json.loads(raw)
            except ValueError:
                self._send(400, {"errors": [{"message": "invalid JSON"}]})
                return
            query = req.get("query", "")
            data = {"__typename": "Query"}
            if "items" in query:
                data["items"] = [
                    {"id": "1", "name": "mock-item-1"},
                    {"id": "2", "name": "mock-item-2"},
                ]
            self._send(200, {"data": data})

        def log_message(self, *args):
            pass

    if __name__ == "__main__":
        ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-mock
  namespace: avapigw-test
  labels:
    app.kubernetes.io/name: graphql-mock
    app.kubernetes.io/part-of: avapigw-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: graphql-mock
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphql-mock
        app.kubernetes.io/part-of: avapigw-test
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: graphql-mock
          image: python:3.12-alpine
          command: ["python3", "/app/server.py"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: server
              mountPath: /app
              readOnly: true
      volumes:
        - name: server
          configMap:
            name: graphql-mock-server
---
apiVersion: v1
kind: Service
metadata:
  name: graphql-mock
  namespace: avapigw-test
  labels:
    app.kubernetes.io/name: graphql-mock
    app.kubernetes.io/part-of: avapigw-test
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: graphql-mock
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
