name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

# Concurrency control - cancel in-progress runs for the same branch/tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.4'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}
  DOCKER_IMAGE_OPERATOR: ghcr.io/${{ github.repository }}-operator
  BINARY_NAME: gateway

jobs:
  # ===========================================================================
  # Parallel Jobs: Lint, Vulnerability Check, Unit Tests, Functional Tests
  # ===========================================================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with coverage
        # Includes OpenAPI validation unit tests from ./internal/openapi/...
        run: |
          mkdir -p coverage
          go test -race -coverprofile=coverage/unit.out -covermode=atomic ./internal/... ./cmd/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/unit.out
          flags: unit
          name: unit-tests
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-unit
          path: coverage/unit.out
          retention-days: 7

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run functional tests with coverage
        # Includes OpenAPI validation functional tests from ./test/functional/...
        run: |
          mkdir -p coverage
          go test -race -coverprofile=coverage/functional.out -covermode=atomic -tags=functional ./test/functional/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/functional.out
          flags: functional
          name: functional-tests
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-functional
          path: coverage/functional.out
          retention-days: 7

  # ===========================================================================
  # Grafana Dashboard Tests (parallel with integration tests)
  # ===========================================================================

  grafana-dashboard-tests:
    name: Grafana Dashboard Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    services:
      victoriametrics:
        image: victoriametrics/victoria-metrics:v1.108.1
        ports:
          - 8428:8428
      grafana:
        image: grafana/grafana:11.5.2
        ports:
          - 3000:3000
        env:
          GF_SECURITY_ADMIN_USER: admin
          GF_SECURITY_ADMIN_PASSWORD: admin
          GF_AUTH_ANONYMOUS_ENABLED: "true"
          GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
          GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Wait for Grafana to be ready
        run: |
          echo "Waiting for Grafana..."
          for i in {1..30}; do
            if curl -sf -u admin:admin http://127.0.0.1:3000/api/health; then
              echo ""
              echo "Grafana is ready!"
              break
            fi
            echo "Attempt $i: Waiting for Grafana..."
            sleep 2
          done

      - name: Validate dashboard JSON syntax
        run: |
          echo "==> Validating dashboard JSON syntax..."
          for file in monitoring/grafana/*.json; do
            if jq empty "$file" 2>/dev/null; then
              echo "  ✓ $(basename "$file"): valid JSON"
            else
              echo "  ✗ $(basename "$file"): invalid JSON"
              exit 1
            fi
          done

      - name: Publish dashboards and validate
        run: |
          chmod +x test/monitoring/scripts/publish-dashboards.sh
          ./test/monitoring/scripts/publish-dashboards.sh \
            http://127.0.0.1:3000 admin admin

  # ===========================================================================
  # Integration and E2E Tests (with backend services)
  # ===========================================================================

  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      # Redis for caching and rate limiting
      redis:
        image: bitnami/redis:latest
        env:
          REDIS_PASSWORD: password
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a password ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
      # Vault for secrets management and PKI
      vault:
        image: hashicorp/vault:1.17
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: myroot
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      # HTTP REST API backends
      backend1:
        image: ghcr.io/vyrodovalexey/restapi-example:e9416f5
        ports:
          - 8801:8080
        env:
          APP_SERVER_PORT: 8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
      backend2:
        image: ghcr.io/vyrodovalexey/restapi-example:e9416f5
        ports:
          - 8802:8080
        env:
          APP_SERVER_PORT: 8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
      # gRPC backends (health check via TCP port since grpcurl not available in container)
      grpc-backend1:
        image: ghcr.io/vyrodovalexey/grpc-example:21f4570
        ports:
          - 8803:8080
        env:
          GRPC_PORT: 8080
          LOG_LEVEL: debug
          SHUTDOWN_TIMEOUT: 60s

      grpc-backend2:
        image: ghcr.io/vyrodovalexey/grpc-example:21f4570
        ports:
          - 8804:8080
        env:
          GRPC_PORT: 8080
          LOG_LEVEL: debug
          SHUTDOWN_TIMEOUT: 60s

      # Redis Sentinel setup for sentinel integration tests
      redis-master:
        image: bitnami/redis:latest
        env:
          REDIS_REPLICATION_MODE: master
          REDIS_PASSWORD: password
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli -a password ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

      redis-replica:
        image: bitnami/redis:latest
        env:
          REDIS_REPLICATION_MODE: slave
          REDIS_MASTER_HOST: redis-master
          REDIS_MASTER_PORT_NUMBER: 6379
          REDIS_MASTER_PASSWORD: password
          REDIS_PASSWORD: password

      redis-sentinel-1:
        image: bitnami/redis-sentinel:latest
        env:
          REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS: 5000
          REDIS_SENTINEL_FAILOVER_TIMEOUT: 10000
          REDIS_SENTINEL_QUORUM: 2
          REDIS_MASTER_HOST: redis-master
          REDIS_MASTER_PORT_NUMBER: 6379
          REDIS_MASTER_PASSWORD: password
          REDIS_MASTER_SET: mymaster
        ports:
          - 26379:26379

      redis-sentinel-2:
        image: bitnami/redis-sentinel:latest
        env:
          REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS: 5000
          REDIS_SENTINEL_FAILOVER_TIMEOUT: 10000
          REDIS_SENTINEL_QUORUM: 2
          REDIS_MASTER_HOST: redis-master
          REDIS_MASTER_PORT_NUMBER: 6379
          REDIS_MASTER_PASSWORD: password
          REDIS_MASTER_SET: mymaster
        ports:
          - 26380:26379

      redis-sentinel-3:
        image: bitnami/redis-sentinel:latest
        env:
          REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS: 5000
          REDIS_SENTINEL_FAILOVER_TIMEOUT: 10000
          REDIS_SENTINEL_QUORUM: 2
          REDIS_MASTER_HOST: redis-master
          REDIS_MASTER_PORT_NUMBER: 6379
          REDIS_MASTER_PASSWORD: password
          REDIS_MASTER_SET: mymaster
        ports:
          - 26381:26379

      # Keycloak DB
      keycloakdb:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: keycloak
          POSTGRES_USER: keycloak
          POSTGRES_PASSWORD: password

      keycloak:
        image: vyrodovalexey/keycloak-test:26.5
        env:
          KC_DB: postgres
          KC_DB_URL: jdbc:postgresql://keycloakdb:5432/keycloak
          KC_DB_USERNAME: keycloak
          KC_DB_PASSWORD: password
          KC_HOSTNAME: 127.0.0.1
          KC_HTTP_PORT: 8090
          KC_HOSTNAME_STRICT: "false"
          KC_HOSTNAME_STRICT_HTTPS: "false"
          KC_LOG_LEVEL: info
          KC_METRICS_ENABLED: "true"
          KC_HEALTH_ENABLED: "true"
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
        ports:
          - 8090:8090
          - 8091:9000


    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true


      - name: Install grpcurl
        run: |
          echo "Installing grpcurl for gRPC health checks..."
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz | tar -xz -C /usr/local/bin grpcurl
          chmod +x /usr/local/bin/grpcurl

      - name: Wait for services to be ready
        run: |
          echo "Waiting for all services to be ready..."
                  
          # Wait for Vault
          echo "Checking Vault..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8200/v1/sys/health | grep -q '"initialized":true'; then
              echo "Vault is ready!"
              break
            fi
            echo "Attempt $i: Waiting for Vault..."
            sleep 2
          done
          
          # Wait for HTTP backends
          echo "Checking HTTP backends..."
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8801/health && curl -sf http://127.0.0.1:8802/health; then
              echo "HTTP backends are ready!"
              break
            fi
            echo "Attempt $i: Waiting for HTTP backends..."
            sleep 2
          done
          
          # Wait for gRPC backends
          echo "Checking gRPC backends..."
          for i in {1..30}; do
            if grpcurl -plaintext 127.0.0.1:8803 list >/dev/null 2>&1 && grpcurl -plaintext 127.0.0.1:8804 list >/dev/null 2>&1; then
              echo "gRPC backends are ready!"
              break
            fi
            echo "Attempt $i: Waiting for gRPC backends..."
            sleep 2
          done
          
          # Wait for Keycloak
          echo "Checking Keycloak..."
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:8091/health/ready; then
              echo "Keycloak is ready!"
              break
            fi
            echo "Attempt $i: Waiting for Keycloak..."
            sleep 5
          done
          
          # Wait for Redis Sentinel
          echo "Checking Redis Sentinel..."
          for i in {1..30}; do
            if redis-cli -h 127.0.0.1 -p 26379 ping 2>/dev/null | grep -q PONG; then
              echo "Redis Sentinel is ready!"
              break
            fi
            echo "Attempt $i: Waiting for Redis Sentinel..."
            sleep 2
          done
          
          # Final checks
          echo "Running final health checks..."
          curl -s http://127.0.0.1:8200/v1/sys/health | grep -q '"initialized":true' || (echo "Vault not ready" && exit 1)
          curl -sf http://127.0.0.1:8801/health || (echo "HTTP Backend 1 not ready" && exit 1)
          curl -sf http://127.0.0.1:8802/health || (echo "HTTP Backend 2 not ready" && exit 1)
          grpcurl -plaintext 127.0.0.1:8803 list || (echo "gRPC Backend 1 not ready" && exit 1)
          grpcurl -plaintext 127.0.0.1:8804 list || (echo "gRPC Backend 2 not ready" && exit 1)
          curl -sf http://127.0.0.1:8091/health/ready || (echo "Keycloak not ready" && exit 1)
          redis-cli -h 127.0.0.1 -p 26379 ping 2>/dev/null | grep -q PONG || echo "Warning: Redis Sentinel not ready (tests may skip sentinel tests)"
          echo "All services are ready!"

      - name: Setup Vault for Testing
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: myroot
        run: |
          # ---------------------------------------------------------------------
          # Provision Vault EXACTLY like the local docker-compose env by running
          # the repo's setup-vault.sh. This creates the shared-CA 'pki' mount with
          # BOTH the server role (test-role) AND the client role (client-role) and
          # issues certs from the SAME CA, so the aggregate mTLS test can issue a
          # client cert from client-role. The script is ENV-driven (VAULT_ADDR/
          # VAULT_TOKEN) and idempotent. It gracefully skips the Docker-volume cert
          # copy when no mtls_certs volume exists (the CI case).
          #
          # The runner already has curl, openssl and python3 (used by the script);
          # no extra tooling install is required.
          # ---------------------------------------------------------------------
          echo "==> Running setup-vault.sh (shared-CA PKI: test-role + client-role)..."
          bash test/docker-compose/scripts/setup-vault.sh

          # ---------------------------------------------------------------------
          # Keep the extra engines/secrets that OTHER tests rely on but which the
          # shared-CA script does not create: Transit (JWT signing) and the
          # api-keys / generic KV test secrets. These are additive and idempotent.
          # ---------------------------------------------------------------------
          echo "==> Adding Transit engine + JWT signing key + test KV secrets..."

          # Generic KV test secret (KV v2 'secret/' is enabled by the script).
          curl -s -X POST -H "X-Vault-Token: myroot" \
            http://127.0.0.1:8200/v1/secret/data/test \
            -d '{"data":{"key":"value"}}'

          # Enable Transit for JWT signing (ignore error if already enabled).
          curl -s -X POST -H "X-Vault-Token: myroot" \
            http://127.0.0.1:8200/v1/sys/mounts/transit \
            -d '{"type":"transit"}' || true

          # Create JWT signing key.
          curl -s -X POST -H "X-Vault-Token: myroot" \
            http://127.0.0.1:8200/v1/transit/keys/jwt-signing \
            -d '{"type":"rsa-2048"}'

          # Store API keys for testing.
          curl -s -X POST -H "X-Vault-Token: myroot" \
            http://127.0.0.1:8200/v1/secret/data/api-keys/test-key \
            -d '{"data":{"key":"test-api-key-12345","scopes":"read,write","enabled":true}}'

          # Verify both PKI roles exist (gate: shared-CA client-role must be present).
          echo "==> Verifying PKI roles..."
          curl -s -H "X-Vault-Token: myroot" \
            http://127.0.0.1:8200/v1/pki/roles/test-role | grep -q "test-role" && echo "PKI role test-role verified"
          curl -s -H "X-Vault-Token: myroot" \
            http://127.0.0.1:8200/v1/pki/roles/client-role | grep -q "client-role" && echo "PKI role client-role verified"

          echo "Vault setup complete!"

      - name: Setup Keycloak for Testing
        env:
          KEYCLOAK_ADDR: http://127.0.0.1:8090
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
        run: |
          # ---------------------------------------------------------------------
          # Wait for Keycloak readiness (management port 8091) before provisioning.
          # ---------------------------------------------------------------------
          echo "Waiting for Keycloak to be ready..."
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:8091/health/ready; then
              echo "Keycloak is ready!"
              break
            fi
            echo "Attempt $i: Waiting for Keycloak..."
            sleep 5
          done

          # ---------------------------------------------------------------------
          # Provision Keycloak EXACTLY like the local docker-compose env by running
          # the repo's setup-keycloak.sh. The script is idempotent and creates BOTH
          # realms in one pass:
          #   * backend-test  -> clients restapi-server, grpc-server and
          #                      gateway-backend (with audience mappers) for the
          #                      service-to-service OIDC aggregate test.
          #   * gateway-test  -> client 'gateway' + test users (testuser/adminuser/
          #                      reader) that the existing OIDC/user-auth tests use.
          # Running the script therefore fully covers what the previous inline step
          # created, so the duplicate inline gateway-test provisioning is dropped.
          # The script is ENV-driven (KEYCLOAK_ADDR / KEYCLOAK_ADMIN[_PASSWORD]).
          # The runner has curl + python3 (used by the script); no extra tooling.
          # ---------------------------------------------------------------------
          echo "==> Running setup-keycloak.sh (backend-test + gateway-test realms)..."
          bash test/docker-compose/scripts/setup-keycloak.sh

          # Explicit verification gate: both realms + client_credentials/password
          # grants must work (the script's --verify mode asserts all of these).
          echo "==> Verifying Keycloak provisioning..."
          bash test/docker-compose/scripts/setup-keycloak.sh --verify

          echo "Keycloak setup complete!"

      - name: Run integration tests (includes WebSocket integration tests)
        env:
          TEST_REDIS_URL: redis://default:password@127.0.0.1:6379
          TEST_VAULT_ADDR: http://127.0.0.1:8200
          TEST_VAULT_TOKEN: myroot
          TEST_KEYCLOAK_ADDR: http://127.0.0.1:8090
          TEST_KEYCLOAK_REALM: gateway-test
          TEST_KEYCLOAK_CLIENT_ID: gateway
          TEST_KEYCLOAK_CLIENT_SECRET: gateway-secret
          # Backend (service-to-service) OIDC realm/client provisioned by
          # setup-keycloak.sh; enables the aggregate per-target OIDC test to RUN.
          TEST_BACKEND_KEYCLOAK_REALM: backend-test
          TEST_BACKEND_KEYCLOAK_CLIENT_ID: gateway-backend
          TEST_BACKEND_KEYCLOAK_CLIENT_SECRET: gateway-backend-secret
          # Shared-CA PKI client role provisioned by setup-vault.sh; the aggregate
          # mTLS test issues a client cert from this role.
          TEST_VAULT_PKI_CLIENT_ROLE: client-role
          # NOTE: the aggregate live mTLS REST backend test (I-1b) intentionally
          # SKIPS in CI. GitHub Actions service containers start BEFORE any setup
          # step, so a Vault-PKI-issued server cert (signed by the shared CA) cannot
          # be injected into a backend service container at startup. The test runs
          # in the local docker-compose env (setup-vault.sh seeds the shared CA into
          # the mtls_certs volume the backend mounts). Point the probe at an
          # unreachable port so the in-test mTLS handshake fails deterministically
          # and the test SKIPS (rather than flaking) here.
          TEST_MTLS_REST_BACKEND: 127.0.0.1:9
          TEST_BACKEND1_URL: http://127.0.0.1:8801
          TEST_BACKEND2_URL: http://127.0.0.1:8802
          TEST_GRPC_BACKEND1_URL: 127.0.0.1:8803
          TEST_GRPC_BACKEND2_URL: 127.0.0.1:8804
          TEST_GRAPHQL_BACKEND1_URL: http://127.0.0.1:8801
          TEST_GRAPHQL_BACKEND2_URL: http://127.0.0.1:8802
          TEST_REDIS_SENTINEL_ADDRS: 127.0.0.1:26379,127.0.0.1:26380,127.0.0.1:26381
          TEST_REDIS_SENTINEL_MASTER_NAME: mymaster
          TEST_REDIS_MASTER_PASSWORD: password
        run: |
          mkdir -p coverage
          go test -race -coverprofile=coverage/integration.out -covermode=atomic -tags=integration -v -timeout 10m ./test/integration/...

      - name: Run e2e tests (includes WebSocket e2e tests)
        env:
          TEST_REDIS_URL: redis://default:password@127.0.0.1:6379
          TEST_VAULT_ADDR: http://127.0.0.1:8200
          TEST_VAULT_TOKEN: myroot
          TEST_KEYCLOAK_ADDR: http://127.0.0.1:8090
          TEST_KEYCLOAK_REALM: gateway-test
          TEST_KEYCLOAK_CLIENT_ID: gateway
          TEST_KEYCLOAK_CLIENT_SECRET: gateway-secret
          # Backend (service-to-service) OIDC realm/client provisioned by
          # setup-keycloak.sh; enables the aggregate per-target OIDC test to RUN.
          TEST_BACKEND_KEYCLOAK_REALM: backend-test
          TEST_BACKEND_KEYCLOAK_CLIENT_ID: gateway-backend
          TEST_BACKEND_KEYCLOAK_CLIENT_SECRET: gateway-backend-secret
          # Shared-CA PKI client role provisioned by setup-vault.sh; the aggregate
          # mTLS test issues a client cert from this role.
          TEST_VAULT_PKI_CLIENT_ROLE: client-role
          # See the integration step: the live mTLS REST backend test SKIPS in CI
          # (GHA service containers cannot receive Vault-PKI-issued certs at
          # startup); point at an unreachable port for deterministic skip.
          TEST_MTLS_REST_BACKEND: 127.0.0.1:9
          TEST_BACKEND1_URL: http://127.0.0.1:8801
          TEST_BACKEND2_URL: http://127.0.0.1:8802
          TEST_GRPC_BACKEND1_URL: 127.0.0.1:8803
          TEST_GRPC_BACKEND2_URL: 127.0.0.1:8804
          TEST_GRAPHQL_BACKEND1_URL: http://127.0.0.1:8801
          TEST_GRAPHQL_BACKEND2_URL: http://127.0.0.1:8802
          TEST_REDIS_SENTINEL_ADDRS: 127.0.0.1:26379,127.0.0.1:26380,127.0.0.1:26381
          TEST_REDIS_SENTINEL_MASTER_NAME: mymaster
          TEST_REDIS_MASTER_PASSWORD: password
        run: |
          go test -race -coverprofile=coverage/e2e.out -covermode=atomic -tags=e2e -v -timeout 15m ./test/e2e/...

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/integration.out,./coverage/e2e.out
          flags: integration,e2e
          name: integration-e2e-tests
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-integration-e2e
          path: |
            coverage/integration.out
            coverage/e2e.out
          retention-days: 7

  # ===========================================================================
  # Sequential Jobs: SonarCloud, Build, Docker
  # ===========================================================================

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, govulncheck, unit-tests, functional-tests, integration-tests, grafana-dashboard-tests]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Required for SonarCloud

      - name: Download unit coverage
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v7.0.0
        with:
          name: coverage-unit
          path: coverage

      - name: Download functional coverage
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v7.0.0
        with:
          name: coverage-functional
          path: coverage

      - name: Download integration/e2e coverage
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v7.0.0
        with:
          name: coverage-integration-e2e
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            "-Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}"
            "-Dsonar.organization=${{ github.repository_owner }}"
            "-Dsonar.go.coverage.reportPaths=coverage/unit.out,coverage/functional.out,coverage/integration.out,coverage/e2e.out"
            "-Dsonar.sources=."
            "-Dsonar.exclusions=**/vendor/**,**/test/**,**/*_test.go,**/mocks/**,**/testdata/**,**/bin/**,**/coverage/**,**/helm/**,**/api/**,**/proto/**"
            "-Dsonar.tests=."
            "-Dsonar.test.inclusions=**/*_test.go"
            "-Dsonar.qualitygate.wait=${{ !startsWith(github.ref, 'refs/tags/') }}"

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [sonarcloud]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: |
          make build

      - name: Verify binary
        run: |
          ./bin/${{ env.BINARY_NAME }} -version || true
          ls -la ./bin/

      - name: Upload binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gateway-binary
          path: bin/${{ env.BINARY_NAME }}
          retention-days: 7

  build-operator:
    name: Build Operator
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [sonarcloud]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build operator binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/operator ./cmd/operator

      - name: Upload operator binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: operator-binary
          path: bin/operator
          retention-days: 7


  docker-build-pr:
    name: Docker Build (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=pr-

      - name: Build Docker image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.gateway
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-operator-pr:
    name: Docker Build Operator (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-operator]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKER_IMAGE_OPERATOR }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=pr-

      - name: Build Docker image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.operator
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ================================
  # Tag-only Jobs: Build & Release
  # ================================

  build-release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [sonarcloud]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build binaries for multiple platforms
        run: |
          mkdir -p bin
          # Linux amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.buildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.gitCommit=${{ github.sha }}" \
            -trimpath \
            -o bin/${{ env.BINARY_NAME }}-linux-amd64 \
            ./cmd/gateway
          # Linux arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.buildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.gitCommit=${{ github.sha }}" \
            -trimpath \
            -o bin/${{ env.BINARY_NAME }}-linux-arm64 \
            ./cmd/gateway
          # Darwin arm64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.buildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.gitCommit=${{ github.sha }}" \
            -trimpath \
            -o bin/${{ env.BINARY_NAME }}-darwin-arm64 \
            ./cmd/gateway
          # Darwin amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.buildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.gitCommit=${{ github.sha }}" \
            -trimpath \
            -o bin/${{ env.BINARY_NAME }}-darwin-amd64 \
            ./cmd/gateway

      - name: Create checksums
        run: |
          cd bin
          sha256sum ${{ env.BINARY_NAME }}-linux-amd64 > ${{ env.BINARY_NAME }}-linux-amd64.sha256
          sha256sum ${{ env.BINARY_NAME }}-linux-arm64 > ${{ env.BINARY_NAME }}-linux-arm64.sha256
          sha256sum ${{ env.BINARY_NAME }}-darwin-arm64 > ${{ env.BINARY_NAME }}-darwin-arm64.sha256
          sha256sum ${{ env.BINARY_NAME }}-darwin-amd64 > ${{ env.BINARY_NAME }}-darwin-amd64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            bin/${{ env.BINARY_NAME }}-linux-amd64
            bin/${{ env.BINARY_NAME }}-linux-amd64.sha256
            bin/${{ env.BINARY_NAME }}-linux-arm64
            bin/${{ env.BINARY_NAME }}-linux-arm64.sha256
            bin/${{ env.BINARY_NAME }}-darwin-arm64
            bin/${{ env.BINARY_NAME }}-darwin-arm64.sha256
            bin/${{ env.BINARY_NAME }}-darwin-amd64
            bin/${{ env.BINARY_NAME }}-darwin-amd64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-binaries
          path: bin/${{ env.BINARY_NAME }}-*
          retention-days: 30

  build-release-operator:
    name: Build & Release Operator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [sonarcloud]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building operator version: ${VERSION}"

      - name: Build operator binaries for multiple platforms
        run: |
          mkdir -p bin
          # Linux amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.buildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.gitCommit=${{ github.sha }}" \
            -trimpath \
            -o bin/operator-linux-amd64 \
            ./cmd/operator
          # Linux arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.buildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.gitCommit=${{ github.sha }}" \
            -trimpath \
            -o bin/operator-linux-arm64 \
            ./cmd/operator

      - name: Create checksums
        run: |
          cd bin
          sha256sum operator-linux-amd64 > operator-linux-amd64.sha256
          sha256sum operator-linux-arm64 > operator-linux-arm64.sha256

      - name: Upload operator binaries to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            bin/operator-linux-amd64
            bin/operator-linux-amd64.sha256
            bin/operator-linux-arm64
            bin/operator-linux-arm64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ===========================================================================
  # Tag-only Jobs: Docker Build & Push, Trivy Scan
  # ===========================================================================

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [sonarcloud]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Cosign keyless signing
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v3.7.0

      - name: Sign container image with Cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0
        with:
          image: ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}
          artifact-name: sbom-${{ steps.meta.outputs.version }}.spdx.json
          output-file: ./sbom.spdx.json
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: ./sbom.spdx.json
          retention-days: 90

  docker-build-push-operator:
    name: Docker Build & Push Operator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [sonarcloud]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Cosign keyless signing
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKER_IMAGE_OPERATOR }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v3.7.0

      - name: Sign container image with Cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Generate SBOM for operator
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0
        with:
          image: ${{ env.DOCKER_IMAGE_OPERATOR }}:${{ steps.meta.outputs.version }}
          artifact-name: sbom-operator-${{ steps.meta.outputs.version }}.spdx.json
          output-file: ./sbom-operator.spdx.json
          upload-release-assets: false

      - name: Upload operator SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-operator
          path: ./sbom-operator.spdx.json
          retention-days: 90

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build-push]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.0
        with:
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ needs.docker-build-push.outputs.image-tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.0
        with:
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ needs.docker-build-push.outputs.image-tag }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'
          exit-code: '1'

      - name: Upload Trivy results artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30

  trivy-scan-operator:
    name: Trivy Security Scan Operator
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build-push-operator]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.0
        with:
          image-ref: '${{ env.DOCKER_IMAGE_OPERATOR }}:${{ needs.docker-build-push-operator.outputs.image-tag }}'
          format: 'sarif'
          output: 'trivy-operator-results.sarif'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: 'trivy-operator-results.sarif'

      - name: Upload Trivy results artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: trivy-operator-results
          path: trivy-operator-results.sarif
          retention-days: 30

  # ===========================================================================
  # Helm Chart Testing (PR - Dry Run)
  # ===========================================================================

  helm-test-pr:
    name: Helm Chart Test (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, govulncheck, unit-tests]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: 'v3.14.0'

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: helm-test
          wait: 120s

      - name: Helm lint
        run: |
          echo "==> Linting Helm chart..."
          helm lint helm/avapigw

      - name: Helm template validation
        run: |
          echo "==> Validating Helm templates..."
          helm template avapigw helm/avapigw > /dev/null
          echo "Template validation successful!"

      - name: Helm dry-run install
        run: |
          echo "==> Running Helm dry-run install..."
          helm install --dry-run --debug avapigw helm/avapigw

      - name: Helm dry-run with Redis enabled
        run: |
          echo "==> Running Helm dry-run with Redis enabled..."
          helm install --dry-run --debug avapigw-redis helm/avapigw \
            --set redis.enabled=true

      - name: Helm dry-run with Redis Sentinel
        run: |
          echo "==> Running Helm dry-run with Redis Sentinel..."
          helm install --dry-run --debug avapigw-sentinel helm/avapigw \
            --set redis.enabled=true \
            --set redis.architecture=replication \
            --set redis.sentinel.enabled=true

      - name: Install Prometheus Operator CRDs
        run: |
          echo "==> Installing Prometheus Operator CRDs for ServiceMonitor support..."
          kubectl apply -f https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/v0.71.0/example/prometheus-operator-crd/monitoring.coreos.com_servicemonitors.yaml

      - name: Helm template with Vault PKI and gRPC TLS
        run: |
          echo "==> Validating Helm templates with Vault PKI + gRPC TLS enabled..."
          helm template test helm/avapigw/ \
            --set vault.enabled=true \
            --set vault.pki.enabled=true \
            --set vault.pki.role=test \
            --set vault.pki.commonName=test.local \
            --set gateway.listeners.grpc.enabled=true > /dev/null
          echo "Vault PKI + gRPC TLS template validation successful!"

      - name: Helm dry-run with all features
        run: |
          echo "==> Running Helm dry-run with all features..."
          helm install --dry-run --debug avapigw-full helm/avapigw \
            --set redis.enabled=true \
            --set autoscaling.enabled=true \
            --set podDisruptionBudget.enabled=true \
            --set ingress.enabled=true \
            --set serviceMonitor.enabled=true

      - name: Helm template with operator enabled
        run: |
          echo "==> Validating Helm templates with operator enabled..."
          helm template avapigw helm/avapigw \
            --set operator.enabled=true \
            --set operator.webhook.enabled=false > /dev/null
          echo "Operator template validation successful!"

      - name: Helm template with ingress controller enabled
        run: |
          echo "==> Validating Helm templates with ingress controller enabled..."
          helm template avapigw helm/avapigw \
            --set operator.enabled=true \
            --set operator.ingressController.enabled=true \
            --set operator.webhook.enabled=false > /dev/null
          echo "Ingress controller template validation successful!"

      - name: Validate Kubernetes manifests with ingress controller
        run: |
          echo "==> Validating generated Kubernetes manifests with ingress controller..."
          helm template avapigw helm/avapigw --set operator.enabled=true --set operator.ingressController.enabled=true --set operator.webhook.enabled=false | kubectl apply --dry-run=client -f -
          echo "Kubernetes manifest validation with ingress controller successful!"

      - name: Validate Kubernetes manifests
        run: |
          echo "==> Validating generated Kubernetes manifests..."
          helm template avapigw helm/avapigw | kubectl apply --dry-run=client -f -
          echo "Kubernetes manifest validation successful!"

      - name: Validate Kubernetes manifests with operator
        run: |
          echo "==> Validating generated Kubernetes manifests with operator..."
          helm template avapigw helm/avapigw --set operator.enabled=true --set operator.webhook.enabled=false | kubectl apply --dry-run=client -f -
          echo "Kubernetes manifest validation with operator successful!"

      - name: Lint monitoring charts
        run: |
          echo "==> Linting test monitoring charts..."
          helm lint test/monitoring/otel-collector
          helm lint test/monitoring/vmagent

      - name: Validate monitoring chart templates
        run: |
          echo "==> Validating monitoring chart templates..."
          helm template otel-collector test/monitoring/otel-collector > /dev/null
          helm template vmagent test/monitoring/vmagent > /dev/null
          echo "Monitoring chart template validation successful!"

      - name: Dry-run install monitoring charts
        run: |
          echo "==> Running Helm dry-run for monitoring charts..."
          helm install --dry-run --debug otel-collector test/monitoring/otel-collector
          helm install --dry-run --debug vmagent test/monitoring/vmagent

      - name: Validate monitoring chart Kubernetes manifests
        run: |
          echo "==> Validating monitoring chart Kubernetes manifests..."
          helm template otel-collector test/monitoring/otel-collector | kubectl apply --dry-run=client -f -
          helm template vmagent test/monitoring/vmagent | kubectl apply --dry-run=client -f -
          echo "Monitoring chart Kubernetes manifest validation successful!"

  # ===========================================================================
  # Helm Chart Install Test (TAG - Full Install)
  # ===========================================================================

  helm-install-test:
    name: Helm Chart Install Test (TAG)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [sonarcloud]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: 'v3.14.0'

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: helm-install-test
          wait: 120s

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image for testing
        run: |
          echo "==> Building Docker image for Helm install test..."
          docker build -f Dockerfile.gateway -t avapigw:helm-test .

      - name: Load image into kind cluster
        run: |
          echo "==> Loading Docker image into kind cluster..."
          kind load docker-image avapigw:helm-test --name helm-install-test

      - name: Create test namespace
        run: |
          kubectl create namespace avapigw-test

      - name: Helm install
        run: |
          echo "==> Installing Helm chart..."
          helm install avapigw helm/avapigw \
            --namespace avapigw-test \
            --set image.repository=avapigw \
            --set image.tag=helm-test \
            --set image.pullPolicy=Never \
            --wait \
            --timeout 5m

      - name: Install monitoring charts
        run: |
          echo "==> Installing monitoring charts..."
          helm install otel-collector test/monitoring/otel-collector \
            --namespace avapigw-test \
            --wait \
            --timeout 3m
          helm install vmagent test/monitoring/vmagent \
            --namespace avapigw-test \
            --wait \
            --timeout 3m
          echo "Monitoring charts installed successfully!"

      - name: Verify deployment
        run: |
          echo "==> Verifying deployment..."
          kubectl get all -n avapigw-test
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=avapigw -n avapigw-test --timeout=120s
          echo "Deployment verification successful!"

      - name: Check pod logs
        run: |
          echo "==> Checking pod logs..."
          kubectl logs -n avapigw-test -l app.kubernetes.io/name=avapigw --tail=50

      - name: Test health endpoint
        run: |
          echo "==> Testing health endpoint..."
          kubectl port-forward -n avapigw-test svc/avapigw 9090:9090 &
          sleep 5
          curl -sf http://localhost:9090/health || (echo "Health check failed" && exit 1)
          echo "Health endpoint test successful!"

      - name: Helm upgrade test
        run: |
          echo "==> Testing Helm upgrade..."
          helm upgrade avapigw helm/avapigw \
            --namespace avapigw-test \
            --set image.repository=avapigw \
            --set image.tag=helm-test \
            --set image.pullPolicy=Never \
            --set replicaCount=2 \
            --wait \
            --timeout 5m
          kubectl get pods -n avapigw-test
          echo "Helm upgrade test successful!"

      - name: Helm uninstall test
        run: |
          echo "==> Testing Helm uninstall..."
          helm uninstall avapigw --namespace avapigw-test
          kubectl delete namespace avapigw-test --wait=false
          echo "Helm uninstall test successful!"
