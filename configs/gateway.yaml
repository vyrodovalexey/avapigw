apiVersion: gateway.avapigw.io/v1
kind: Gateway
metadata:
  name: main-gateway
  labels:
    app: avapigw
    environment: ${GATEWAY_ENV:-development}
spec:
  listeners:
    - name: http
      port: ${GATEWAY_PORT:-8080}
      protocol: HTTP
      hosts:
        - "*"
      bind: 0.0.0.0

    # gRPC listener configuration (uncomment to enable)
    # - name: grpc
    #   port: ${GATEWAY_GRPC_PORT:-9000}
    #   protocol: GRPC
    #   hosts:
    #     - "*"
    #   bind: 0.0.0.0
    #   grpc:
    #     maxConcurrentStreams: 100
    #     maxRecvMsgSize: 4194304  # 4MB
    #     maxSendMsgSize: 4194304  # 4MB
    #     reflection: true
    #     healthCheck: true
    #     keepalive:
    #       time: 30s
    #       timeout: 10s
    #       maxConnectionIdle: 5m
    #       maxConnectionAge: 30m
    #       maxConnectionAgeGrace: 10s
    #       permitWithoutStream: true

  routes:
    - name: health-check
      match:
        - uri:
            exact: /health
          methods:
            - GET
      directResponse:
        status: 200
        body: '{"status":"healthy"}'
        headers:
          Content-Type: application/json

    - name: items-api
      match:
        - uri:
            prefix: /api/v1/items
          methods:
            - GET
            - POST
            - PUT
            - DELETE
      route:
        - destination:
            host: 127.0.0.1
            port: 8801
          weight: 50
        - destination:
            host: 127.0.0.1
            port: 8802
          weight: 50
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: "5xx,reset,connect-failure"

    - name: backend-health
      match:
        - uri:
            prefix: /backend/health
          methods:
            - GET
      rewrite:
        uri: /health
      route:
        - destination:
            host: 127.0.0.1
            port: 8801

    - name: catch-all
      match:
        - uri:
            prefix: /
      route:
        - destination:
            host: 127.0.0.1
            port: 8801

  backends:
    - name: backend-service-1
      hosts:
        - address: 127.0.0.1
          port: 8801
          weight: 1
      healthCheck:
        path: /health
        interval: 10s
        timeout: 5s
        healthyThreshold: 2
        unhealthyThreshold: 3
      loadBalancer:
        algorithm: roundRobin

    - name: backend-service-2
      hosts:
        - address: 127.0.0.1
          port: 8802
          weight: 1
      healthCheck:
        path: /health
        interval: 10s
        timeout: 5s
        healthyThreshold: 2
        unhealthyThreshold: 3
      loadBalancer:
        algorithm: roundRobin

  # gRPC routes configuration (uncomment to enable)
  # grpcRoutes:
  #   - name: test-service-route
  #     match:
  #       - service:
  #           exact: api.v1.TestService
  #     route:
  #       - destination:
  #           host: 127.0.0.1
  #           port: 8803
  #         weight: 50
  #       - destination:
  #           host: 127.0.0.1
  #           port: 8804
  #         weight: 50
  #     timeout: 30s
  #     retries:
  #       attempts: 3
  #       perTryTimeout: 10s
  #       # Comma-separated gRPC status conditions (lowercase-hyphen), one string.
  #       # Valid values: canceled, deadline-exceeded, internal,
  #       # resource-exhausted, unavailable
  #       retryOn: "unavailable,resource-exhausted"
  #
  #   - name: catch-all-grpc
  #     match:
  #       - service:
  #           prefix: "*"
  #     route:
  #       - destination:
  #           host: 127.0.0.1
  #           port: 8803

  # gRPC backends configuration (uncomment to enable)
  # grpcBackends:
  #   - name: grpc-backend-1
  #     hosts:
  #       - address: 127.0.0.1
  #         port: 8803
  #         weight: 1
  #     healthCheck:
  #       enabled: true
  #       service: ""
  #       interval: 10s
  #       timeout: 5s
  #     connectionPool:
  #       maxConnsPerHost: 100
  #       maxIdleConns: 10
  #       idleConnTimeout: 90s
  #
  #   - name: grpc-backend-2
  #     hosts:
  #       - address: 127.0.0.1
  #         port: 8804
  #         weight: 1
  #     healthCheck:
  #       enabled: true
  #       service: ""
  #       interval: 10s
  #       timeout: 5s
  #     connectionPool:
  #       maxConnsPerHost: 100
  #       maxIdleConns: 10
  #       idleConnTimeout: 90s

  rateLimit:
    enabled: true
    requestsPerSecond: 100
    burst: 200
    perClient: true

  circuitBreaker:
    enabled: true
    threshold: 5
    timeout: 30s
    halfOpenRequests: 3

  cors:
    allowOrigins:
      - "*"
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowHeaders:
      - Content-Type
      - Authorization
      - X-Request-ID
    exposeHeaders:
      - X-Request-ID
    maxAge: 86400
    allowCredentials: false

  audit:
    enabled: true
    output: stdout
    format: json
    level: info
    events:
      authentication: true
      authorization: true
      request: false
      response: false
      configuration: true
      security: true
    skipPaths:
      - /health
      - /metrics
      - /ready
      - /live
    redactFields:
      - password
      - secret
      - token
      - authorization
      - cookie

  observability:
    metrics:
      enabled: true
      path: /metrics
      port: 9090
    tracing:
      enabled: false
      samplingRate: 1.0
      otlpEndpoint: ""
      serviceName: avapigw
      # OTLP exporter transport security (optional). When omitted:
      # otlpTLS material forces TLS; otherwise plaintext is used only for
      # unset/loopback endpoints and remote endpoints default to TLS with
      # system roots. Set otlpInsecure: true explicitly for a remote
      # plaintext collector.
      # otlpInsecure: false
      # otlpTLS:
      #   certFile: /etc/gateway/otlp/tls.crt   # client cert for mTLS (requires keyFile)
      #   keyFile: /etc/gateway/otlp/tls.key
      #   caFile: /etc/gateway/otlp/ca.crt      # private CA for collector verification
    logging:
      level: info
      format: json

  # Gateway-wide Vault CLIENT CONNECTION (uncomment to enable).
  # This configures how the gateway reaches and authenticates against the
  # Vault server. It is distinct from the per-listener/route/backend
  # `tls.vault` blocks, which configure PKI certificate ISSUANCE and require
  # this client (or VAULT_ADDR). Environment variables override these values
  # per-field: ENV (VAULT_ADDR, VAULT_TOKEN, VAULT_APPROLE_SECRET_ID, ...) >
  # config file > defaults.
  #
  # NOTE: when enabled: true, `address` plus auth material for the selected
  # authMethod are required or the gateway fails validation at boot.
  # vault:
  #   enabled: true
  #   address: ${VAULT_ADDR:-https://vault:8200}
  #   # namespace: my-namespace              # Vault Enterprise namespace
  #   authMethod: kubernetes                 # token | kubernetes | approle
  #
  #   # --- token auth (authMethod: token) ---
  #   # token: <discouraged inline>          # prefer tokenFile or VAULT_TOKEN
  #   # tokenFile: /vault/secrets/token      # mutually exclusive with token
  #
  #   # --- kubernetes auth (authMethod: kubernetes) ---
  #   kubernetes:
  #     role: avapigw
  #     mountPath: kubernetes
  #     tokenPath: /var/run/secrets/kubernetes.io/serviceaccount/token
  #
  #   # --- approle auth (authMethod: approle) ---
  #   # appRole:
  #   #   roleId: gateway
  #   #   secretIdFile: /vault/secrets/secret-id   # prefer over inline secretId
  #   #   mountPath: approle
  #
  #   # TLS for the connection TO the Vault server
  #   tls:
  #     caCert: /etc/vault/ca.crt
  #     # caPath: /etc/vault/ca-dir
  #     # clientCert: /etc/vault/tls.crt     # mTLS to Vault (requires clientKey)
  #     # clientKey: /etc/vault/tls.key
  #     # serverName: vault.internal         # SNI override
  #     # skipVerify: true                   # testing only
  #
  #   # Client-side secret caching
  #   cache:
  #     enabled: true
  #     ttl: 5m
  #     maxSize: 1000
  #
  #   # Request retry behavior (exponential backoff)
  #   retry:
  #     maxRetries: 3
  #     backoffBase: 100ms
  #     backoffMax: 5s
  #
  #   # Startup authentication retry bounds
  #   auth:
  #     maxRetries: 3
  #     initialBackoff: 1s
  #     maxBackoff: 10s
  #     timeout: 30s
